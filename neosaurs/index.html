    <script>
    // PC: fix 3D aspect by adjusting camera FOV to preserve mobile's horizontal FOV.
    // NO letterboxing (no black bars). Canvas fills full viewport natively.
    // Camera.aspect always matches real viewport; vertical FOV is reduced on wide
    // screens so the horizontal world shown matches portrait mode.
    !function(){
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && /Mac/.test(navigator.platform));
      var mq = window.matchMedia && window.matchMedia('(min-width:769px) and (hover:hover) and (pointer:fine)');
      var isPC = mq && mq.matches;
      if(!isPC || isMobile) return;

      // Mobile base: vFOV 75° at 9:16 aspect. Preserve horizontal FOV on wider aspects.
      var MOBILE_VFOV = 75;
      var MOBILE_ASPECT = 9 / 16;

      function targetVFov(){
        var aspect = window.innerWidth / window.innerHeight;
        if(aspect <= MOBILE_ASPECT) return MOBILE_VFOV; // taller than mobile — keep native
        // hFOV = 2*atan(tan(vFOV/2) * aspect). Keep hFOV = mobile's hFOV.
        var hFovRad = 2 * Math.atan(Math.tan(MOBILE_VFOV * Math.PI / 360) * MOBILE_ASPECT);
        var newVFovRad = 2 * Math.atan(Math.tan(hFovRad / 2) / aspect);
        return newVFovRad * 180 / Math.PI;
      }

      var _debounce = null;
      function applyCameraFov(){
        try{
          if(window.camera && window.camera.isPerspectiveCamera){
            var f = targetVFov();
            if(Math.abs((window.camera.fov || 0) - f) > 0.1){
              window.camera.fov = f;
              window.camera.aspect = window.innerWidth / window.innerHeight;
              if(window.camera.updateProjectionMatrix) window.camera.updateProjectionMatrix();
            }
          }
        }catch(e){}
      }

      // Wait for camera to be ready, then apply and listen
      var _ready = setInterval(function(){
        if(typeof THREE === 'undefined') return;
        if(!window.camera || !window.camera.isPerspectiveCamera) return;
        clearInterval(_ready);
        applyCameraFov();

        function onResize(){
          // Debounce to avoid flicker on rapid resize
          if(_debounce) clearTimeout(_debounce);
          _debounce = setTimeout(applyCameraFov, 60);
        }
        window.addEventListener('resize', onResize);
        window.addEventListener('orientationchange', onResize);
        if(window.visualViewport){ window.visualViewport.addEventListener('resize', onResize); }
      }, 200);
    }();
    </script>

    // Provides window.haptic(), window.haptic.confirm(), .error(), .warning(), .light(), .heavy()

    <script data-neo-patch="dashui-bridge">
    (function(){
      console.log('[Neosaurs/DASHUI bridge] init');
      try{
        var u=new URL(location.href);
        var fromDashui=(u.searchParams.get('from')==='dashui' || u.searchParams.get('back')==='1' || document.referrer.indexOf('dashui')>=0);
        if(fromDashui){
          var btn=document.getElementById('dashuiBackBtn');
          if(btn){btn.classList.add('show');console.log('[bridge] back button visible')}
        }
        // DASHUI 経由ならいつでも Create ボタンを unlock 状態に保つ
        if(fromDashui){
          var keepUnlocked=function(){
            var cb=document.getElementById('welcomeCreateBtn');
            if(cb){
              try{cb.classList.remove('locked');cb.classList.remove('lock')}catch(e){}
              // MutationObserver で再度 locked が付与されたら即時除去
              try{
                new MutationObserver(function(muts){
                  muts.forEach(function(m){
                    if(m.attributeName==='class' && cb.classList.contains('locked')){
                      cb.classList.remove('locked');
                    }
                  });
                }).observe(cb,{attributes:true,attributeFilter:['class']});
              }catch(e){}
              return true;
            }
            return false;
          };
          if(!keepUnlocked()){
            var _kt=0, _ki=setInterval(function(){if(keepUnlocked()||++_kt>200)clearInterval(_ki)},100);
          }
        }
        // create=1 なら Welcome 可視後に Create ボタン強制アンロック→タップ
        if(u.searchParams.get('create')==='1'){
          console.log('[bridge] create=1 — will force-unlock + tap #welcomeCreateBtn');
          var tries=0, tapped=false;
          var isVisible=function(el){
            if(!el)return false;
            var r=el.getBoundingClientRect();
            if(r.width<1||r.height<1)return false;
            var st=getComputedStyle(el);
            return st.display!=='none' && st.visibility!=='hidden' && parseFloat(st.opacity||'1')>.5;
          };
          var tap=function(){
            if(tapped)return;
            var cb=document.getElementById('welcomeCreateBtn');
            if(isVisible(cb)){
              // locked class を強制除去(Neosaurs の卵 30 個制限をバイパス)
              try{cb.classList.remove('locked');cb.classList.remove('lock')}catch(e){}
              // DASHUI から来たマークで特殊解放フラグを立てる
              try{window.__dashuiUnlockCreate=true;localStorage.setItem('neo_createUnlock','1')}catch(e){}
              tapped=true;
              // 発火(複数イベント)
              try{
                var rect=cb.getBoundingClientRect();
                var cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
                // Pointer + Mouse + Touch をフル発火(Neosaurs が拾う系統を全部)
                ['pointerdown','mousedown','touchstart'].forEach(function(type){
                  try{
                    if(type==='touchstart'){
                      var t=new Touch({identifier:1,target:cb,clientX:cx,clientY:cy,pageX:cx,pageY:cy});
                      cb.dispatchEvent(new TouchEvent('touchstart',{bubbles:true,cancelable:true,touches:[t],targetTouches:[t],changedTouches:[t]}));
                    }else{
                      cb.dispatchEvent(new (type.startsWith('pointer')?PointerEvent:MouseEvent)(type,{bubbles:true,cancelable:true,clientX:cx,clientY:cy,button:0,buttons:1}));
                    }
                  }catch(e){}
                });
                setTimeout(function(){
                  try{cb.click()}catch(e){}
                  ['pointerup','mouseup','click','touchend'].forEach(function(type){
                    try{
                      if(type==='touchend'){
                        cb.dispatchEvent(new TouchEvent('touchend',{bubbles:true,cancelable:true,changedTouches:[]}));
                      }else{
                        cb.dispatchEvent(new (type.startsWith('pointer')?PointerEvent:MouseEvent)(type,{bubbles:true,cancelable:true,clientX:cx,clientY:cy,button:0}));
                      }
                    }catch(e){}
                  });
                },50);
              }catch(e){console.warn('[bridge] synthetic click failed',e)}
              return;
            }
            if(++tries<140)setTimeout(tap,120);
          };
          setTimeout(tap,700);
        }
      }catch(e){console.warn('[bridge] init error',e)}
    })();
    </script>

      document.head.appendChild(nbStyle);

      // ── Create NeoBench overlay HTML ──

        '<div id="neobenchCard">',

        '    <p class="nb-subtitle">コンピュータの性能を検証</p>',

      // History overlay

        '<div class="nb-hist-content" id="nbHistContent">',
        '  <h2 class="nb-hist-title">検証履歴</h2>',

      // Help overlay
      var nbHelp = document.createElement('div');
      nbHelp.id = 'neobenchHelp';
      nbHelp.innerHTML = [
        '<div class="nb-help-bg" id="nbHelpBg"></div>',
        '<div class="nb-help-card" id="nbHelpCard">',
        '  <h3 class="nb-help-title">NeoBench について</h3>',
        '  <p class="nb-help-text">NeoBenchはデバイスの性能を測定するベンチマークツールです。<br><br>',
        '  <strong>検証する</strong> — CPU・GPU・メモリの基本テスト<br>',
        '  <strong>深く検証する</strong> — より詳細な負荷テスト<br><br>',
        '  スコアが高いほど高性能なデバイスです。</p>',
        '  <button class="nb-help-close" id="nbHelpClose">OK</button>',
        '</div>'
      ].join('');
      document.body.appendChild(nbHelp);

      // ── State ──
      var nbState = { open: false, running: false, view: 'picker' };
      var BENCH_HISTORY_KEY = 'neobench_history';

      // ── NeoBench-scoped SFX ──
      // Strategy: cloneNode-on-click. A master Audio is preloaded for each file;
      // each click clones the master and plays the clone. Clones auto-cleanup on
      // 'ended'. This GUARANTEES every press fires sound (no pause→play races,
      // works after the game's audio engine has woken up). To avoid two
      // different NeoBench sounds overlapping, each call first pauses any
      // currently playing clones from OTHER files.
      var _nbMasters = {};       // src → master Audio (for cloning)
      var _nbActiveClones = {};  // src → [clones currently playing]
      function _mkSfx(src, vol){
        var master = new Audio(src);
        master.preload = 'auto';
        master.volume = vol;
        try{ master.load(); }catch(e){}
        _nbMasters[src] = master;
        _nbActiveClones[src] = [];
        return function(){
          // Stop currently-playing clones of DIFFERENT files (no cross-overlap)
          Object.keys(_nbActiveClones).forEach(function(otherSrc){
            if(otherSrc === src) return;
            _nbActiveClones[otherSrc].forEach(function(c){
              try{ c.pause(); c.currentTime = 0; }catch(e){}
            });
            _nbActiveClones[otherSrc] = [];
          });
          // Clone & play (always succeeds, even on rapid repeat)
          try{
            var c = master.cloneNode(true);
            c.volume = vol;
            _nbActiveClones[src].push(c);
            c.addEventListener('ended', function(){
              var arr = _nbActiveClones[src];
              var i = arr.indexOf(c);
              if(i >= 0) arr.splice(i, 1);
            }, {once:true});
            var p = c.play();
            if(p && p.catch) p.catch(function(){
              // Fallback: try master directly (after unlock)
              try{ master.currentTime = 0; master.play().catch(function(){}); }catch(e){}
            });
          }catch(e){
            try{ master.currentTime = 0; master.play().catch(function(){}); }catch(e){}
          }
        };
      }
      var sfxOpen    = _mkSfx('last.mp3',      0.85);   // NeoBench 起動
      var sfxRun     = _mkSfx('click-003.mp3', 0.85);   // 検証する
      var sfxDeep    = _mkSfx('c3.mp3',        0.85);   // 深く検証する
      var sfxHelp    = _mkSfx('h2.mp3',        0.85);   // ?
      var sfxBack    = _mkSfx('hover-x6.mp3',  0.85);   // ‹ (neobench から戻る)
      var sfxHistOpen= _mkSfx('click-01.mp3',  0.85);   // 検証履歴を表示
      var sfxBackMp3 = _mkSfx('back.mp3',      0.85);   // 削除 / ? OK / close
      var sfxResult  = _mkSfx('mac-act.mp3',   0.9);    // 検証後の結果表示

      function getBenchHistory(){
        try{ var h = JSON.parse(localStorage.getItem(BENCH_HISTORY_KEY) || '[]'); return Array.isArray(h) ? h : []; }catch(e){ return []; }
      }
      function saveBenchResult(result){
        var h = getBenchHistory();
        h.unshift(result);
        if(h.length > 50) h = h.slice(0, 50);
        try{ localStorage.setItem(BENCH_HISTORY_KEY, JSON.stringify(h)); }catch(e){}
      }
      function deleteBenchAt(idx){
        var h = getBenchHistory();
        if(idx < 0 || idx >= h.length) return h;
        h.splice(idx, 1);
        try{ localStorage.setItem(BENCH_HISTORY_KEY, JSON.stringify(h)); }catch(e){}
        return h;
      }
      function _fireHaptic(){
        try{
          if(window.haptic && window.haptic.confirm) haptic.confirm();
          else if(window.iosHaptic && window.iosHaptic.confirm) iosHaptic.confirm();
        }catch(e){}
        if(navigator.vibrate) navigator.vibrate(12);
      }
      function renderHistoryList(listEl, hist){
        listEl.innerHTML = '';
        if(!hist || hist.length === 0){
          var empty = document.createElement('p');
          empty.style.cssText = 'text-align:center;color:rgba(255,255,255,0.35);font-family:"SF Pro Display",-apple-system,sans-serif;font-size:0.9rem;padding:2rem 0;';
          empty.textContent = '履歴はありません';
          listEl.appendChild(empty);
          return;
        }
        hist.forEach(function(item, idx){
          var d = new Date(item.date);
          var dateStr = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + (d.getMinutes()<10?'0':'') + d.getMinutes();
          var div = document.createElement('div');
          div.className = 'nb-hist-item';
          div.innerHTML = '<div class="nb-hist-item-left"><span class="nb-hist-item-score">' + (item.score || '—') + '</span><span class="nb-hist-item-type">' + (item.type === 'deep' ? 'Deep Benchmark' : 'Standard') + '</span></div><div class="nb-hist-item-right"><span class="nb-hist-item-date">' + dateStr + '</span><button class="nb-hist-item-del" aria-label="delete" data-idx="' + idx + '">削除</button></div>';
          listEl.appendChild(div);
        });
        // Wire delete buttons
        listEl.querySelectorAll('.nb-hist-item-del').forEach(function(btn){
          btn.addEventListener('click', function(e){
            e.stopPropagation();
            sfxBackMp3();
            _fireHaptic();
            var idx = parseInt(btn.getAttribute('data-idx'), 10);
            var item = btn.closest('.nb-hist-item');
            // Fade-out the row then re-render
            if(item){
              item.style.transition = 'transform 0.3s '+BEZ+',opacity 0.3s '+BEZ+',max-height 0.35s '+BEZ+',margin 0.35s '+BEZ+',padding 0.35s '+BEZ;
              item.style.overflow = 'hidden';
              item.style.maxHeight = item.offsetHeight + 'px';
              requestAnimationFrame(function(){
                item.style.opacity = '0';
                item.style.transform = 'translateX(40px)';
                item.style.maxHeight = '0px';
                item.style.margin = '0';
                item.style.padding = '0';
              });
            }
            setTimeout(function(){
              var h = deleteBenchAt(idx);
              renderHistoryList(listEl, h);
              // If no more history, close the history overlay
              if(h.length === 0){
                setTimeout(function(){ closeHistory(); }, 200);
              }
              // Also update the main "検証履歴を表示" button visibility
              var histBtn = document.getElementById('nbHistBtn');
              if(histBtn && h.length < 2) histBtn.classList.remove('nb-show');
            }, 360);
          });
        });
      }

      // ── Open NeoBench ──
      function openNeoBench(){
        if(nbState.open) return;
        nbState.open = true;
        nbState.view = 'picker';
        nbState.running = false;

        var ov = document.getElementById('neobenchOverlay');
        var bg = document.getElementById('neobenchBg');
        var card = document.getElementById('neobenchCard');
        var histBtn = document.getElementById('nbHistBtn');

        // Reset views
        document.getElementById('nbPickerView').style.display = '';
        document.getElementById('nbRunningView').style.display = 'none';
        document.getElementById('nbResultView').style.display = 'none';

        // Show history button if 2+ results
        var hist = getBenchHistory();
        if(hist.length >= 2){ histBtn.classList.add('nb-show'); }
        else{ histBtn.classList.remove('nb-show'); }

        ov.classList.add('nb-visible');
        card.classList.remove('nb-in','nb-out');

        // Open sound (時計/設定から開く) — last.mp3 のみ
        sfxOpen();

        requestAnimationFrame(function(){ requestAnimationFrame(function(){
          bg.classList.add('nb-dim');
          card.classList.add('nb-in');
        }); });
      }

      // ── Close NeoBench ──
      function closeNeoBench(){
        if(!nbState.open) return;
        var bg = document.getElementById('neobenchBg');
        var card = document.getElementById('neobenchCard');

        bg.classList.remove('nb-dim');
        card.classList.remove('nb-in');
        card.classList.add('nb-out');
        // Slide nbHistBtn down at the same time as the bottom bar
        var hb = document.getElementById('nbHistBtn');
        if(hb) hb.classList.remove('nb-show');

        // SFX handled by specific button listener (sfxBack etc.) — not here
        try{
          if(window.haptic && window.haptic.confirm) haptic.confirm();
          else if(window.iosHaptic && window.iosHaptic.confirm) iosHaptic.confirm();
        }catch(e){}
        if(navigator.vibrate) navigator.vibrate(10);

        nbState.running = false;

        setTimeout(function(){
          nbState.open = false;
          var ov = document.getElementById('neobenchOverlay');
          ov.classList.remove('nb-visible');
          card.classList.remove('nb-out');

          // Clean up any original benchmark overlays that may have been created
          var orig = document.getElementById('benchmarkOverlay');
          if(orig) orig.remove();
          var origPicker = document.getElementById('benchPickerOverlay');
          if(origPicker) origPicker.remove();
          // Reset benchmark active flag
          try{ window._benchmarkActive = false; }catch(e){}
        }, 700);
      }

      // ── Run benchmark (intercept original) ──
      function nbStartBench(deep){
        nbState.running = true;
        nbState.view = 'running';
        document.getElementById('nbPickerView').style.display = 'none';
        var runningView = document.getElementById('nbRunningView');
        runningView.style.display = '';
        runningView.classList.remove('nb-view-enter'); void runningView.offsetWidth; runningView.classList.add('nb-view-enter');
        document.getElementById('nbResultView').style.display = 'none';
        document.getElementById('nbProgressBar').style.width = '0%';
        document.getElementById('nbStatusText').textContent = '準備中...';
        document.getElementById('nbRunLabel').textContent = deep ? 'NEOBENCH DEEP' : 'NEOBENCH';

        try{ if(window.haptic && window.haptic.confirm) haptic.confirm(); }catch(e){}
        if(navigator.vibrate) navigator.vibrate(10);
        // SFX handled by the run/deep button listener (sfxRun / sfxDeep)

        // Run the actual benchmark in a way that captures results
        // We'll monitor for benchmarkOverlay creation and extract results
        var resultCaptured = false;
        var progressPoller = null;

        // Poll for progress and results from the original benchmark overlay
        progressPoller = setInterval(function(){
          var bar = document.querySelector('#benchmarkOverlay #benchBar, #benchmarkOverlay .neo-progress-bar__fill');
          if(bar){
            var w = bar.style.width || '0%';
            document.getElementById('nbProgressBar').style.width = w;
          }
          var status = document.querySelector('#benchmarkOverlay #benchStatus');
          if(status && status.textContent){
            document.getElementById('nbStatusText').textContent = status.textContent;
          }

          // Check for result (close button appears when done)
          var closeBtn = document.getElementById('benchCloseBtn');
          if(closeBtn && !resultCaptured){
            resultCaptured = true;
            clearInterval(progressPoller);
            document.getElementById('nbProgressBar').style.width = '100%';

            // Extract score from the overlay — pick the standalone number with the
            // LARGEST font size (scores are visually biggest in the benchmark UI)
            var overlayEl = document.getElementById('benchmarkOverlay');
            var scoreText = '0';
            var details = [];
            if(overlayEl){
              var allP = overlayEl.querySelectorAll('p, span, div, h1, h2, h3');
              var candidates = [];
              for(var i = 0; i < allP.length; i++){
                var el = allP[i];
                // Skip container nodes that have element children — only leaf text
                var hasElChild = false;
                for(var ch = 0; ch < el.children.length; ch++){
                  if(el.children[ch].nodeType === 1){ hasElChild = true; break; }
                }
                if(hasElChild) continue;
                var t = (el.textContent||'').trim().replace(/,/g,'');
                // Pure number, 2-7 digits → candidate for score
                if(/^\d{2,7}$/.test(t)){
                  var cs = window.getComputedStyle(el);
                  var fs = parseFloat(cs.fontSize) || 0;
                  candidates.push({val: parseInt(t,10), fs: fs});
                }
                var raw = (el.textContent||'').trim();
                if(/(CPU|GPU|Memory|メモリ|Graphics|Compute|Render|Score|FPS|ms)/i.test(raw) && raw.length < 100){
                  details.push(raw);
                }
              }
              // Sort: biggest font first, then biggest value
              candidates.sort(function(a,b){ return (b.fs - a.fs) || (b.val - a.val); });
              if(candidates.length > 0){ scoreText = String(candidates[0].val); }

              var benchLine1 = document.getElementById('benchLine1');
              var benchLine2 = document.getElementById('benchLine2');
              if(benchLine1) details.unshift(benchLine1.textContent);
              if(benchLine2) details.push(benchLine2.textContent);

              // Hide original overlay
              overlayEl.style.display = 'none';
              overlayEl.style.opacity = '0';
              overlayEl.style.pointerEvents = 'none';
            }

            // Save result
            var resultObj = {
              score: parseInt(scoreText) || 0,
              type: deep ? 'deep' : 'standard',
              details: details.slice(0, 8),
              date: new Date().toISOString()
            };
            saveBenchResult(resultObj);

            // Show result view
            showNbResult(resultObj);
          }
        }, 300);

        // Timeout safety
        setTimeout(function(){
          if(!resultCaptured){
            clearInterval(progressPoller);
            // If no result after 60s, try to capture whatever we can
            var overlayEl = document.getElementById('benchmarkOverlay');
            if(overlayEl){
              var allText = overlayEl.innerText || '';
              var nums = allText.match(/\d{2,6}/g);
              var score = nums && nums.length > 0 ? parseInt(nums[nums.length - 1]) : 0;
              var resultObj = { score: score, type: deep ? 'deep' : 'standard', details: [], date: new Date().toISOString() };
              saveBenchResult(resultObj);
              overlayEl.style.display = 'none';
              showNbResult(resultObj);
            } else {
              // No overlay at all — show error
              showNbResult({ score: 0, type: deep ? 'deep' : 'standard', details: ['ベンチマークがタイムアウトしました'], date: new Date().toISOString() });
            }
          }
        }, 65000);

        // Trigger the original benchmark:
        // Step 1: Ensure the original picker exists (click benchHint to create it)
        // Step 2: Click the appropriate button inside the hidden picker
        function triggerOrigBench(){
          var picker = window._nbOrigPicker || document.getElementById('benchPickerOverlay');
          if(!picker){
            // Picker not yet created — trigger benchHint to make game create it
            _bhIntercepted = true; // prevent our capture handler from firing
            var bh = document.getElementById('benchHint');
            if(bh) bh.click();
            _bhIntercepted = false;
            // Wait for picker to appear
            setTimeout(triggerOrigBench, 400);
            return;
          }

          try{
            if(deep){
              var deepBtn = document.getElementById('benchDeepBtn') || picker.querySelector('#benchDeepBtn');
              if(deepBtn){ deepBtn.click(); return; }
            }
            // Normal bench: find the button that's not deep/close/help
            var btns = picker.querySelectorAll('button');
            var clicked = false;
            for(var i = 0; i < btns.length; i++){
              var b = btns[i];
              if(b.id === 'benchDeepBtn' || b.id === 'benchCloseBtn') continue;
              var txt = (b.textContent || '').trim();
              if(txt.indexOf('深') >= 0 || txt.indexOf('Deep') >= 0) continue;
              if(txt.indexOf('閉') >= 0 || txt === '?' || txt === '×') continue;
              if(txt.length === 0) continue;
              // This should be the standard bench button
              if(txt.indexOf('検証') >= 0 || txt.indexOf('Bench') >= 0 || txt.indexOf('Run') >= 0 || txt.indexOf('Start') >= 0){
                b.click(); clicked = true; break;
              }
            }
            if(!clicked){
              // Last resort: click first non-special button
              for(var j = 0; j < btns.length; j++){
                if(btns[j].id !== 'benchDeepBtn' && btns[j].id !== 'benchCloseBtn'){
                  var t2 = (btns[j].textContent||'').trim();
                  if(t2.length > 0 && t2.indexOf('?') < 0 && t2.indexOf('×') < 0){
                    btns[j].click(); break;
                  }
                }
              }
            }
          }catch(e){
            clearInterval(progressPoller);
            showNbResult({ score: 0, type: deep ? 'deep' : 'standard', details: ['エラー: ' + (e.message||'')], date: new Date().toISOString() });
          }
        }
        setTimeout(triggerOrigBench, 200);
      }

      function showNbResult(result){
        nbState.view = 'result';
        nbState.running = false;
        document.getElementById('nbPickerView').style.display = 'none';
        document.getElementById('nbRunningView').style.display = 'none';
        var resultView = document.getElementById('nbResultView');
        resultView.style.display = '';
        resultView.classList.remove('nb-view-enter'); void resultView.offsetWidth; resultView.classList.add('nb-view-enter');
        sfxResult();

        document.getElementById('nbScoreValue').textContent = result.score || '—';
        document.getElementById('nbResultTitle').textContent = result.type === 'deep' ? 'NEOBENCH DEEP' : 'NEOBENCH v2.0';

        var detailsEl = document.getElementById('nbResultDetails');
        detailsEl.innerHTML = '';
        if(result.details && result.details.length > 0){
          result.details.forEach(function(d){
            if(d && d.trim()){
              var p = document.createElement('p');
              p.className = 'nb-result-detail';
              p.textContent = d;
              detailsEl.appendChild(p);
            }
          });
        }

        // Update history button
        var hist = getBenchHistory();
        var histBtn = document.getElementById('nbHistBtn');
        if(hist.length >= 2) histBtn.classList.add('nb-show');
      }

      // ── History View ──
      // Re-entry guard — prevents duplicate open/close animations firing
      var _histAnimating = false;
      var _histOpen = false;
      function openHistory(){
        if(_histAnimating || _histOpen) return; // prevent duplicate
        var hist = getBenchHistory();
        if(hist.length < 2) return;

        var histEl = document.getElementById('neobenchHistory');
        var bg = document.getElementById('nbHistBg');
        var content = document.getElementById('nbHistContent');
        var list = document.getElementById('nbHistList');

        renderHistoryList(list, hist);

        _histAnimating = true;
        _histOpen = true;
        histEl.classList.add('nb-visible');
        content.classList.remove('nb-in');

        requestAnimationFrame(function(){ requestAnimationFrame(function(){
          bg.classList.add('nb-dim');
          content.classList.add('nb-in');
          setTimeout(function(){ _histAnimating = false; }, 520);
        }); });

        try{ if(window.haptic && window.haptic.confirm) haptic.confirm(); }catch(e){}
        if(navigator.vibrate) navigator.vibrate(10);
      }

      function closeHistory(){

      function isTapTarget(el){
        if(!el) return false;
        if(el.tagName === 'BUTTON') return true;
        if(el.classList && (el.classList.contains('liquid-button') || el.classList.contains('haptic-btn') ||
           el.classList.contains('neo-btn-pill') || el.classList.contains('neo-btn-rounded') ||
           el.classList.contains('neo-close-btn') || el.classList.contains('map-course-node') ||
           el.classList.contains('editor-item') || el.classList.contains('vm-choice') ||
           el.classList.contains('vm-confirm') || el.classList.contains('vm-close') ||
           el.classList.contains('share-arrow-btn') || el.classList.contains('settings-arrow-btn') ||
           el.classList.contains('lives-bar') )) return true;
        if(el.getAttribute && (el.getAttribute('role') === 'button')) return true;
        return false;
      }
      function globalHaptic(e){
        try{
          var el = e.target && e.target.closest ? e.target.closest('button, [role="button"], .liquid-button, .haptic-btn, .neo-btn-pill, .neo-btn-rounded, .neo-close-btn, .map-course-node, .editor-item, .vm-choice, .vm-confirm, .vm-close, .share-arrow-btn, .settings-arrow-btn, .lives-bar, .intro-notif') : null;
          if(!el) return;
          // Avoid double-haptic: if element already owns dedicated handling, skip (we still emit a light tap for unhandled cases)
          if(el._neoHapticFired) return; el._neoHapticFired = true;
          setTimeout(function(){ el._neoHapticFired = false; }, 80);
          if(isConfirmButton(el)) hapConf(); else hapTap();
        }catch(err){}
      }
      document.addEventListener('touchstart', globalHaptic, {passive:true, capture:true});
      document.addEventListener('click',      globalHaptic, true);

      // ── 6. WorldMap transition: delegated to the pre-existing patch (~line 773).
      //      Nothing added here — duplication removed per user guidance.
    }();
    </script>
