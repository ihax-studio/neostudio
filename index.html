/* ---------------- Animate ---------------- */
const clock=new THREE.Clock();let tt=0;
let fpsAvg=60,fpsT=0,fpsCnt=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  if(G.paused){
    composer.render();
    if(!$('title').classList.contains('hide'))bgRenderer.render(scene,camera);
    return;
  }
  tt+=dt;
  fpsT+=dt;fpsCnt++;
  if(fpsT>=.5){fpsAvg=fpsCnt/fpsT;fpsT=0;fpsCnt=0;
    const nb=document.getElementById('nbFps');if(nb)nb.textContent=fpsAvg.toFixed(0)}

  const yaw=G.camYaw;
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  const mv=new THREE.Vector3();let moving=false;
  if(keys.w||keys.arrowup)mv.add(fwd);
  if(keys.s||keys.arrowdown)mv.sub(fwd);
  if(keys.a||keys.arrowleft)mv.sub(rt);
  if(keys.d||keys.arrowright)mv.add(rt);
  if(joyV.x||joyV.y){
    mv.add(fwd.clone().multiplyScalar(-joyV.y));
    mv.add(rt.clone().multiplyScalar(joyV.x));
  }
  if(mv.lengthSq()>.01){mv.normalize();moving=true}
  const wantDash=(keys.shift||tcState.dash)&&moving&&stamina>.05&&!flying&&!inWater;
  const curSpeed=inWater?WATER_SPEED:(wantDash?SPEED*DASH_MULT:SPEED);
  // T8: 屋敷内は慣性(速度ベクトル + 摩擦)
  if(G.velX===undefined){G.velX=0;G.velZ=0}
  let useInertia=(G.area==='building');
  let stepX,stepZ;
  if(useInertia){
    const ACCEL_H=30, MAX_H=7.5, FRICTION_H=0.88;
    if(moving){
      G.velX += mv.x * ACCEL_H * dt;
      G.velZ += mv.z * ACCEL_H * dt;
    }
    const fpow=Math.pow(FRICTION_H, Math.max(0,dt)*60);
    G.velX *= fpow; G.velZ *= fpow;
    const vv=Math.hypot(G.velX,G.velZ);
    if(vv>MAX_H){G.velX*=MAX_H/vv;G.velZ*=MAX_H/vv}
    if(Math.hypot(G.velX,G.velZ)<.02){G.velX=0;G.velZ=0}
    // 傾き
    if(player){
      player.rotation.z = lerp(player.rotation.z||0, -G.velX*0.04, 0.1);
      player.rotation.x = lerp(player.rotation.x||0,  G.velZ*0.04, 0.1);
    }
    stepX=G.velX*dt;stepZ=G.velZ*dt;
  }else{
    G.velX=0;G.velZ=0;
    if(player){
      player.rotation.z = lerp(player.rotation.z||0, 0, 0.15);
      player.rotation.x = lerp(player.rotation.x||0, 0, 0.15);
    }
    stepX=mv.x*curSpeed*dt;stepZ=mv.z*curSpeed*dt;
  }
  if(moving||(useInertia&&Math.hypot(G.velX,G.velZ)>.001)){
    const nx=playerPos.x+stepX,nz=playerPos.z+stepZ;
    const PR=.38;
    let blockX=false,blockZ=false;
    if(G.area==='grass'){
      for(const o of obstacles){
        const rr=o.r+PR;
        if(Math.hypot(nx-o.x,playerPos.z-o.z)<rr)blockX=true;
        if(Math.hypot(playerPos.x-o.x,nz-o.z)<rr)blockZ=true;
        if(blockX&&blockZ)break;
      }
      if(!(blockX&&blockZ)){
        for(const w of walls){
          // X step: check nx vs current z
          if(!blockX){
            const cxA=clamp(nx,w.x1,w.x2),czA=clamp(playerPos.z,w.z1,w.z2);
            if(Math.hypot(nx-cxA,playerPos.z-czA)<PR)blockX=true;
          }
          if(!blockZ){
            const cxB=clamp(playerPos.x,w.x1,w.x2),czB=clamp(nz,w.z1,w.z2);
            if(Math.hypot(playerPos.x-cxB,nz-czB)<PR)blockZ=true;
          }
          if(blockX&&blockZ)break;
        }
      }
    }
    // Mountain slope limit — ジャンプ中 or 飛行中は無効、地上時のみ急斜面を遮る
    if(G.area==='grass'&&onGround&&!flying){
      const curY=heightAt(playerPos.x,playerPos.z);
      if(!blockX){
        const dY=heightAt(nx,playerPos.z)-curY;
        if(dY>2.8)blockX=true;  // 2.1→2.8 で更に緩和
      }
      if(!blockZ){
        const dY=heightAt(playerPos.x,nz)-curY;
        if(dY>2.8)blockZ=true;
      }
    }
    if(!blockX)playerPos.x=nx;
    if(!blockZ)playerPos.z=nz;
  }
  if(wantDash)stamina=Math.max(0,stamina-dt*.55);

  // Ocean swim detection — only past the wet sand
  const prevInWater=inWater;
  inWater=(G.area==='grass'&&playerPos.z<-103&&Math.abs(playerPos.x)<190&&playerPos.y<.6);
  if(inWater&&!prevInWater){snd('check',.3);toast('🌊 '+(G_LANG==='ja'?'泳げる':G_LANG==='en'?'Swim':G_LANG==='zh'?'游泳':'수영'));try{haptic&&haptic()}catch(_){}}
  if(!inWater&&prevInWater){try{haptic&&haptic()}catch(_){}}

  // Jump / fly / swim
  const nowMs=performance.now();
  const boosted=nowMs<flyBoostUntil;
  const jumpKey=keys[' ']||tcState.jumpHeld;
  if(jumpKey&&(nowMs-spacePressed)>400&&(stamina>0.02||boosted)&&!inWater)flying=true;
  if(flying&&jumpKey&&!inWater){
    velY=Math.min(velY+GRAVITY*dt*2,boosted?8:6);
    if(!boosted)stamina=Math.max(0,stamina-dt);
    if(stamina<=0&&!boosted)flying=false;
  }else if(inWater){
    if(jumpKey){velY=Math.min(velY+12*dt,3.5)}
    else velY-=4*dt;
    velY=clamp(velY,-2,4);
  }else if(boosted&&!onGround){
    // Bird-like glide during boost: slow fall, faster when pressing jump
    velY-=GRAVITY*dt*.28;
    if(velY<-2.2)velY=-2.2;  // terminal glide speed
  }else{
    velY-=GRAVITY*dt;
  }
  playerPos.y+=velY*dt;
  // HARD altitude cap on grass — player cannot exceed ground+MAX_ALT
  if(G.area==='grass'){
    const gY=heightAt(playerPos.x,playerPos.z);
    const MAX_ALT=12; // max altitude above local ground (big jumps & springs fit)
    if(playerPos.y>gY+MAX_ALT){playerPos.y=gY+MAX_ALT;if(velY>0)velY=0}
  }

  // Wings visibility + flap (layered group)
  // Wings only during mid-air glide (boost active AND airborne AND falling/gliding)
  const gliding=boosted&&!onGround;
  const tgtOp=gliding?1:0;
  wingOpacity=lerp(wingOpacity,tgtOp,1-Math.exp(-6*dt));
  if(wingL){
    const setOp=(grp)=>{
      grp.children.forEach(c=>{
        if(c.material){
          if(c===grp.userData.halo) c.material.opacity=wingOpacity*.55;
          else if(c===grp.userData.under) c.material.opacity=wingOpacity*.45;
          else c.material.opacity=wingOpacity*.95;
        }
      });
      grp.visible=wingOpacity>.04;
    };
    setOp(wingL);setOp(wingR);
    if(wingOpacity>.04){
      const flapRate=onGround?4:9.5;
      const flap=Math.sin(tt*flapRate)*.6;
      const sub=Math.cos(tt*flapRate*2)*.08; // secondary motion
      wingL.rotation.z=-Math.PI*.12+flap;
      wingR.rotation.z=Math.PI*.12-flap;
      wingL.rotation.x=wingR.rotation.x=-.22+sub;
      // trailing feathers lag the main wing
      [wingL,wingR].forEach((g,si)=>{
        g.userData.quills.forEach((q,i)=>{
          const lag=Math.sin(tt*flapRate-i*.25)*.35;
          q.rotation.z=(-.15-i*.09)+lag*(si===0?1:-1)*.3;
        });
        // halo pulses
        if(g.userData.halo) g.userData.halo.material.opacity=wingOpacity*(.45+Math.abs(Math.sin(tt*flapRate))*.4);
        // sheen shimmer
        if(g.userData.sheen) g.userData.sheen.material.opacity=wingOpacity*(.15+Math.abs(Math.sin(tt*flapRate*1.5))*.35);
        // sparkle orbit around wing tip
        if(g.userData.sparks){
          g.userData.sparks.forEach((s,i)=>{
            const ph=tt*1.8+s.userData.phase;
            s.position.set(1.2+Math.cos(ph)*.35,.2+Math.sin(ph*1.3)*.35,Math.sin(ph*.7)*.08);
            s.material.opacity=wingOpacity*(.5+Math.sin(ph*2)*.5);
            const sc=.7+Math.sin(ph*2)*.4;s.scale.setScalar(sc);
          });
        }
      });
    }
  }

  // Spring bounce — direct contact launches, nearby gives a small hop
  if(G.area==='grass'&&onGround){
    for(const sp of SPRINGS){
      const dx=playerPos.x-sp.userData.x,dz=playerPos.z-sp.userData.z;
      const d=Math.hypot(dx,dz);
      if(d<sp.userData.r&&playerPos.y<sp.userData.base+1.8){
        velY=14;onGround=false;snd('jump',.8);hOk();
        sp.position.y=sp.userData.base-.3;
        setTimeout(()=>sp.position.y=sp.userData.base,180);
      }else if(d<sp.userData.r*2.2&&!sp.userData.hopCd&&moving){
        velY=4.5;onGround=false;snd('jump',.4);
        sp.position.y=sp.userData.base-.12;
        setTimeout(()=>sp.position.y=sp.userData.base,160);
        sp.userData.hopCd=true;setTimeout(()=>sp.userData.hopCd=false,700);
      }
    }
  }

  // Tower proximity: mega jump to rooftop + flight boost + exit bit8
  if(G.area==='grass'&&nowMs>towerCd){
    for(const t of TOWERS){
      const d=Math.hypot(playerPos.x-t.x,playerPos.z-t.z);
      if(d<4.5){
        towerCd=nowMs+1500;
        velY=Math.max(velY, Math.sqrt(2*GRAVITY*(t.top-playerPos.y+1)) );
        onGround=false;
        flyBoostUntil=nowMs+12000;stamina=1;
        try{const a=new Audio('sounds/mail-sent.caf');a.volume=.6;a.play().catch(()=>{})}catch(e){}
        if(bit8)toggleBit8(false);
        toast('🗼 大ジャンプ！浮遊ブースト',2000);
        hOk();
        break;
      }
    }
  }

  // Pipe proximity: toggle bit8 mode
  if(G.area==='grass'&&nowMs>pipeCd){
    for(const p of PIPES){
      if(Math.hypot(playerPos.x-p.x,playerPos.z-p.z)<p.r&&playerPos.y<p.top+.3){
        pipeCd=nowMs+1800;
        toggleBit8(!bit8);
        velY=8;onGround=false;
        break;
      }
    }
  }

  const gh=G.area==='grass'?heightAt(playerPos.x,playerPos.z):0;
  let floorY=Math.max(0,gh);
  if(inWater)floorY=WATER_Y;
  // T1: Sun 77 Remix のプラットフォーム足場
  if(G.area==='sunCourse'){
    floorY=-10;  // デフォは落下
    for(const p of SUN77_PLATFORMS){
      if(Math.abs(playerPos.x-p.x)<p.w/2 && Math.abs(playerPos.z-p.z)<p.d/2){
        if(playerPos.y>=p.y+.3-.01){  // 上から乗る
          floorY=Math.max(floorY, p.y+.33);
        }
      }
    }
    // ゴール判定(足場7の上のゴール星に近い)
    if(!G.sun77Goaled){
      const goal=sunCourseGrp.userData.goal;
      if(goal && Math.hypot(playerPos.x-goal.position.x,playerPos.z-goal.position.z)<1.6 && Math.abs(playerPos.y-goal.position.y)<2.4){
        G.sun77Goaled=true;
        exitSunRemix(true);
      }
    }
    // 落下(失敗)
    if(playerPos.y<-5 && !G.sun77Goaled){
      G.sun77Hearts=(G.sun77Hearts||3)-1;
      snd('c1',.5);hNg();
      if(G.sun77Hearts<=0){exitSunRemix(false)}
      else{playerPos.set(0,1,0);velY=0}
    }
  }
  // T5: 着地 haptic(ある程度の高さから落ちた時のみ)
  const _prevOnGround=onGround, _prevVelY=velY;
  if(playerPos.y<=floorY){playerPos.y=floorY;velY=0;onGround=true}else onGround=false;
  if(!_prevOnGround && onGround && _prevVelY<-4.5){try{haptic&&haptic()}catch(_){}}
  if(!flying&&(onGround||inWater)&&stamina<1)stamina=Math.min(1,stamina+dt*.5);
  $('stamina').classList.toggle('on',flying||wantDash||stamina<.99);
  $('stBar').style.width=(stamina*100)+'%';

  if(G.area==='grass'){
    playerPos.x=clamp(playerPos.x,-GRASS_SIZE/2+4,GRASS_SIZE/2-4);
    playerPos.z=clamp(playerPos.z,-170,GRASS_SIZE/2-4); // allow swim deep into ocean
  }else if(G.area==='building'){
    const R=ROOMS[G.room],hw=R.w/2-.6,hh=R.h/2-.6;
    playerPos.x=clamp(playerPos.x,-hw,hw);playerPos.z=clamp(playerPos.z,-hh,hh);
  }else if(G.area==='custom'){
    playerPos.x=clamp(playerPos.x,-5.5,5.5);playerPos.z=clamp(playerPos.z,-5.5,5.5);
  }

  player.position.copy(playerPos);
  if(moving&&onGround){
    player.position.y=playerPos.y+Math.abs(Math.sin(tt*10))*.08;
    pMat.emissiveIntensity=.55+Math.sin(tt*4)*.2;
  }else{
    pMat.emissiveIntensity=.45;
  }

  for(let i=0;i<DUST_N;i++){
    if(dustLife[i]>0){dustLife[i]-=dt;
      dustPos[i*3+1]+=dt*.5;
      if(dustLife[i]<=0)dustPos[i*3+1]=-99;
    }
  }
  if(moving&&onGround){
    for(let k=0;k<2;k++){
      const i=Math.floor(Math.random()*DUST_N);
      if(dustLife[i]<=0){
        dustPos[i*3]=playerPos.x+(Math.random()-.5)*.4;
        dustPos[i*3+1]=playerPos.y+.1;
        dustPos[i*3+2]=playerPos.z+(Math.random()-.5)*.4;
        dustLife[i]=.5;
      }
    }
  }
  dustGeo.attributes.position.needsUpdate=true;

  // Ocean waves
  for(let i=0;i<oPos.count;i++){
    const x=oBase[i*3],z=oBase[i*3+2];
    oPos.setY(i,Math.sin(tt*.8+x*.1)*.3+Math.cos(tt*1.1+z*.08)*.25);
  }
  oPos.needsUpdate=true;
  wfMat.opacity=.55+Math.sin(tt*8)*.15;

  collectibles.forEach((c,i)=>{
    if(!c.visible)return;
    c.position.y=c.userData.base+Math.sin(tt*2+i)*.28;
    if(c.userData.spin)c.userData.spin.rotation.y+=dt*1.6;
  });

  // Clouds drift
  for(const cl of CLOUDS){
    cl.position.x+=cl.userData.vx*dt;
    if(cl.position.x>110)cl.position.x=-110;
  }
  // Wind sway on trees
  const gust=.6+Math.sin(tt*.35)*.4;
  for(const t of TREES){
    const a=Math.sin(tt*1.2+t.userData.ph)*.055*gust;
    t.userData.leaf.rotation.z=a;
    t.userData.leaf.position.x=a*.8;
  }
  // Wind sway on grass tufts
  for(const gs of GRASS){
    gs.rotation.z=Math.sin(tt*2.2+gs.userData.ph)*.15*gust;
  }
  // Iron tower blinker
  const tw=world.userData.ironTower;
  if(tw){
    const on=Math.sin(tt*2)>0;
    tw.userData.blinker.material.color.setHex(on?0xff3040:0x551010);
    tw.userData.blinkerLight.intensity=on?1.4:.2;
  }
  // Spring idle bob
  for(const sp of SPRINGS){
    const target=sp.userData.base;
    sp.position.y+=(target-sp.position.y)*.15;
  }
  // Swim visual + stroke motion + splashes
  if(inWater){
    // Body pitch forward with rhythmic stroke
    const stroke=Math.sin(tt*5)*.18;
    player.rotation.x=-.9+stroke;
    player.rotation.z=Math.sin(tt*5)*.12;
    player.position.y=Math.max(playerPos.y-.15,WATER_Y-.2)+Math.sin(tt*4)*.06;
    // Splash particles
    if(moving){
      for(let k=0;k<2;k++){
        const i=Math.floor(Math.random()*SPLASH_N);
        if(splashLife[i]<=0){
          splashPos[i*3]=playerPos.x+(Math.random()-.5)*.8;
          splashPos[i*3+1]=WATER_Y+.2+Math.random()*.4;
          splashPos[i*3+2]=playerPos.z+(Math.random()-.5)*.8;
          splashLife[i]=.6;
        }
      }
    }
  }else{
    player.rotation.x=lerp(player.rotation.x,0,.2);
    player.rotation.z=lerp(player.rotation.z,0,.2);
  }
  for(let i=0;i<SPLASH_N;i++){
    if(splashLife[i]>0){
      splashLife[i]-=dt;
      splashPos[i*3+1]+=dt*1.5;
      if(splashLife[i]<=0)splashPos[i*3+1]=-99;
    }
  }
  splashGeo.attributes.position.needsUpdate=true;

  interactables.forEach(it=>{
    if(!it.grp.visible)return;
    if(it.data.kind==='item'||it.data.kind==='note'||it.data.kind==='tool'||it.data.kind==='quiz'){
      const basey=it.data.y||1;
      it.grp.position.y=basey+Math.sin(tt*2+basey)*.12;
    }
  });

  // Storage spotlight follow
  if(G.area==='building'&&G.room===2&&storageSpot&&G.found.has('flashlight')){
    storageSpot.position.set(playerPos.x,3.5,playerPos.z);
    const look=new THREE.Vector3(playerPos.x+fwd.x*3,0,playerPos.z+fwd.z*3);
    roomGroups[2].userData.spotTgt.position.copy(look);
  }
  // T9: プレイヤー追随 SpotLight(懐中電灯) + ろうそく
  if(G.area==='building'){
    if(G.found.has('flashlight')){
      playerFlashlight.intensity=3;
      playerFlashlight.position.set(playerPos.x,playerPos.y+1.5,playerPos.z);
      playerFlashlightTgt.position.set(playerPos.x+fwd.x*5,playerPos.y,playerPos.z+fwd.z*5);
      playerFlashlightTgt.updateMatrixWorld();
    }else playerFlashlight.intensity=0;
    if(G.found.has('candle')){
      playerCandle.intensity=2.5;
      playerCandle.position.set(playerPos.x,playerPos.y+1.3,playerPos.z);
    }else playerCandle.intensity=0;
  }else{
    playerFlashlight.intensity=0;
    playerCandle.intensity=0;
  }

  // Camera
  const now=performance.now();
  const gY=(G.area==='grass')?heightAt(playerPos.x,playerPos.z):0;
  // lookY directly tracks the player so they're ALWAYS in frame (no lag, no drift).
  // anchorY drives camera position with a short smoothing (fast enough to prevent
  // visible drift during glide/boost, soft enough to avoid jitter).
  G.camLookY=playerPos.y+.9;
  G.camAnchorY=lerp(G.camAnchorY,playerPos.y,1-Math.exp(-(onGround?10:8)*dt));
  let cx,cy,cz,lookY=G.camLookY;
  if(now<G.cineEnd&&G.cineTarget){
    cx=G.cineTarget.x;cy=G.cineTarget.y;cz=G.cineTarget.z;
  }else if(G.area==='building'){
    // Mansion: fixed wide shot looking at room center — CLOSE-UP big view
    const R=ROOMS[G.room];
    const D=Math.max(R.w,R.h);
    cx=0;
    cy=D*1.3+6;
    cz=D*0.55+1.5;
    lookY=0.4;
    if(camera.fov!==55){camera.fov=55;camera.updateProjectionMatrix()}
  }else{
    if(camera.fov!==60){camera.fov=60;camera.updateProjectionMatrix()}
    const pt=G.camPitch;
    cx=playerPos.x+Math.sin(yaw)*G.camDist*Math.cos(pt);
    cy=G.camAnchorY+3.2+G.camDist*Math.sin(pt)*.65;
    cz=playerPos.z+Math.cos(yaw)*G.camDist*Math.cos(pt);
    // Only a soft ground-clearance clamp; anchor-tracking keeps height natural
    if(cy<gY+1.8)cy=gY+1.8;
  }
  // Clamp camera distance depending on area so it never clips walls in tight rooms
  // (building uses a fixed static shot above, so no clamp needed)
  if(G.area==='custom')G.camDist=clamp(G.camDist,3.5,7);
  else if(G.area!=='building')G.camDist=clamp(G.camDist,4,14);

  // Cinematic dt-based smoothing (framerate-independent)
  // Strong smoothing so the camera glides, never jitters during jump/glide
  const smooth=moving?3.5:2.2;
  const k=1-Math.exp(-smooth*dt);
  G.camPos.x=lerp(G.camPos.x,cx,k);G.camPos.y=lerp(G.camPos.y,cy,k);G.camPos.z=lerp(G.camPos.z,cz,k);
  // Never let camera drop below a safe ground height
  const groundMin=(G.area==='grass'?Math.max(0,heightAt(G.camPos.x,G.camPos.z)):0)+1.4;
  if(G.camPos.y<groundMin)G.camPos.y=groundMin;
  // Minimum distance: camera never pokes into player
  // (skip inside mansion — we use a fixed far-away static shot there)
  if(G.area!=='building'){
    const toP=new THREE.Vector3(G.camPos.x-playerPos.x,G.camPos.y-lookY,G.camPos.z-playerPos.z);
    const d=toP.length();if(d<2.2){toP.setLength(2.2);G.camPos.set(playerPos.x+toP.x,lookY+toP.y,playerPos.z+toP.z)}
  }
  camera.position.copy(G.camPos);

  // HARD GUARANTEE: camera pitch NEVER tilts upward, no matter how high the player jumps.
  // Clamp look target so it's always at or below the camera's own Y (minus a small epsilon).
  // This means pitch is always ≤ 0 (horizontal or looking down). Player may go off-screen on
  // extreme jumps, which is the intended tradeoff — camera won't look up at the sky.
  if(lookY>G.camPos.y-.3)lookY=G.camPos.y-.3;

  // Camera occlusion — never let the player be hidden behind walls
  // (skip inside mansion — static high-angle shot must not snap closer)
  if(now>=G.cineEnd && G.area!=='building'){
    const look=new THREE.Vector3(playerPos.x,lookY,playerPos.z);
    const dir=new THREE.Vector3().subVectors(camera.position,look);
    const len=dir.length();
    if(len>.2){
      dir.normalize();
      const ray=new THREE.Raycaster(look,dir,.3,len);
      const occ=[];
      if(G.area==='building'){
        roomGroups[G.room]?.traverse(o=>{
          if(o.isMesh && o.geometry && !(o.material&&o.material.transparent))occ.push(o);
        });
      }else if(G.area==='grass'){
        portalIn.traverse(o=>{if(o.isMesh && !(o.material&&o.material.transparent))occ.push(o)});
        // tower as occluder
        if(world.userData.ironTower)world.userData.ironTower.traverse(o=>{if(o.isMesh)occ.push(o)});
      }else if(G.area==='custom'){
        customRoom.traverse(o=>{if(o.isMesh && !(o.material&&o.material.transparent))occ.push(o)});
      }
      const hit=occ.length?ray.intersectObjects(occ,false):[];
      if(hit.length){
        const safe=Math.max(2.4,hit[0].distance-.5);
        const target=look.clone().add(dir.clone().multiplyScalar(safe));
        // Lift slightly so player stays center of frame
        if(target.y<look.y+1)target.y=look.y+1.2;
        // Smooth snap so occlusion doesn't jitter
        G.camPos.lerp(target,.6);
        camera.position.copy(G.camPos);
      }
    }
  }
  // Absolute safety: never go under terrain
  const camGround=(G.area==='grass'?Math.max(0,heightAt(camera.position.x,camera.position.z)):0)+1.2;
  if(camera.position.y<camGround){camera.position.y=camGround;G.camPos.y=camGround}
  if(G.area==='building'){
    // Mansion: look at fixed room center (NOT player) so the camera never rotates as player walks
    camera.lookAt(0, 0.4, 0);
  }else{
    camera.lookAt(playerPos.x,lookY,playerPos.z);
  }

  // Nearest interactable + auto pickup on approach
  G.nearest=null;
  let src;
  if(G.area==='grass'){
    src=interactables.filter(it=>it.room===-1&&it.grp.visible)
      .concat(collectibles.filter(c=>c.visible).map(c=>({grp:c,data:c.userData})));
  }else if(G.area==='building'){
    src=interactables.filter(it=>it.room===G.room&&it.grp.visible);
  }else src=[];
  let nearestDist=Infinity;
  for(const it of src){
    const p=new THREE.Vector3();it.grp.getWorldPosition(p);
    const d=p.distanceTo(playerPos);
    if(d<2.8 && d<nearestDist){G.nearest=it;nearestDist=d}
  }
  if(G.nearest){
    const d=G.nearest.data;$('prompt').textContent=(IS_TOUCH?'タップ ':'[E] ')+(d.emoji||'')+' '+(d.name||'');
    $('prompt').classList.add('on');
    // ── 接近ヒント(Dynamic Island)。同じ要素で連発しないようクールダウン。
    G._hintSeen = G._hintSeen || {};
    const hintKey = d.id || d.kind;
    if(hintKey && !G._hintSeen[hintKey] && nearestDist < 2.4){
      G._hintSeen[hintKey] = now + 8000;  // 8秒は再通知しない
      let sub = '';
      if(d.kind==='quiz'){
        const req=['note1','note2','note3','flashlight'];
        const miss=req.filter(id=>!G.found.has(id));
        sub = miss.length ? `あと${miss.length}個必要` : 'タップして挑戦';
      }else if(d.kind==='door'){ sub = d.name || 'へ移動'; }
      else if(d.kind==='portalIn'){ sub = 'タップで入る'; }
      else if(d.kind==='exitPortal'){ sub = G.puzzleSolved?'外へ出られる':'まだパズル未解決'; }
      else if(d.kind==='note'){ sub = G.found.has(d.id)?'もう一度読む':'メモを調べる'; }
      else if(G.found.has(d.id)){ sub = '入手済み'; }
      else { sub = '近づいて取得'; }
      island(d.emoji||'💡', d.name||'アイテム', sub);
    }
    // ── 古いヒント履歴を掃除(長時間同じ場所にいて何度も通知は気持ち悪いが、
    //    離れて戻ってきたら再通知したいので期限切れで削除)
    for(const k in G._hintSeen){ if(G._hintSeen[k] < now) delete G._hintSeen[k]; }
    // Auto-trigger on close approach — タッチ時のみ(PC は E キー / インタラクトボタンで手動)
    // 卵の吸い込み + 太陽接触は常に自動(PC/mobile 問わず)
    if(d.kind==='collect'&&nearestDist<2.0){collectPickup(G.nearest)}
    // 太陽は物理的に「触れたら」Neosaurs:衝突半径で発動
    else if(d.kind==='sunRemix'&&nearestDist<9.0&&(!G._sunCd||now>G._sunCd)){enterSunRemix();G._sunCd=now+5000}
    else if(IS_TOUCH){
      if((d.kind==='item'||d.kind==='tool'||d.kind==='note')&&nearestDist<1.8&&!G.found.has(d.id)){tryInteract()}
      else if(d.kind==='map'&&nearestDist<1.8&&!G.nearest.grp.userData.taken){pickupMap(G.nearest)}
      else if(d.kind==='ipod'&&nearestDist<1.8&&!G.nearest.grp.userData.taken){pickupIpod(G.nearest)}
      else if(d.kind==='imac'&&nearestDist<2.2&&(!G._macCd||now>G._macCd)){openIMacDesktop();G._macCd=now+2500}
      else if(d.kind==='iphone'&&nearestDist<2.0&&(!G._phCd||now>G._phCd)){openIPhone();G._phCd=now+2500}
      else if(d.kind==='portalIn'&&nearestDist<2.5){enterBuilding()}
      else if(d.kind==='pipeWorldmap'&&nearestDist<1.9&&(!G._pipeCd||now>G._pipeCd)){enterSunRemix();G._pipeCd=now+3000}
      else if(d.kind==='sunRemix'&&nearestDist<2.5&&(!G._sunCd||now>G._sunCd)){enterSunRemix();G._sunCd=now+3000}
      else if(d.kind==='door'&&nearestDist<1.8 && (!G._doorCd||now>G._doorCd)){enterRoom(d.to);G._doorCd=now+800}
      else if(d.kind==='exitPortal'&&nearestDist<.9&&G.puzzleSolved){tryExit()}
    }
  }else $('prompt').classList.remove('on');

  if(G.puzzleSolved)exitPortal.visible=true;

  updateWeather(dt);
  tickWeatherCycle(dt);

  if(auroraEnd>now){
    const col=new THREE.Color().setHSL((tt*.3)%1,.8,.6);
    scene.background.copy(col);scene.fog.color.copy(col);
  }else if(auroraEnd!==0&&now>=auroraEnd){
    auroraEnd=0;setBgColor(new THREE.Color(SKY.r,SKY.g,SKY.b).getHex());
  }

  // シャボン玉のふわふわ+回転
  if(world.userData.giantBubble){
    const g=world.userData.giantBubble;
    g.position.y = heightAt(g.position.x,g.position.z)+6 + Math.sin(tt*0.6)*0.4;
    g.rotation.y += dt*0.12;
  }
  if(world.userData.appleTower && appleStoreTowerGrp){
    appleStoreTowerGrp.rotation.y = Math.sin(tt*0.25)*0.08;
  }
  // sun 回転+コロナ呼吸
  if(sunGrp){
    sunGrp.rotation.y += dt*0.05;
    if(sunCorona1)sunCorona1.material.opacity = 0.25 + Math.sin(tt*1.2)*0.06;
  }

  // Debug HUD (`?debug=1`)
  if(window._dashuiDebug && $('dashuiDbg')){
    const d=$('dashuiDbg');
    d.textContent=
      `FPS ${fpsAvg.toFixed(0)}  area ${G.area||'-'}  room ${G.room??'-'}`
      +` pos ${playerPos.x.toFixed(1)},${playerPos.y.toFixed(1)},${playerPos.z.toFixed(1)}`
      +` vy ${velY.toFixed(1)} onG ${onGround?1:0} water ${inWater?1:0}`
      +` fnd ${G.found?Array.from(G.found).length:0}`;
  }
  drawMinimap();
  composer.render();
  if(!$('title').classList.contains('hide'))bgRenderer.render(scene,camera);
  // T7: 自動品質降格(30fps 未満が 5秒続いたら low へ)
  if(!_qBench){_qBench={last:performance.now(),low:0}}
  const _qnow=performance.now(),_qdt=(_qnow-_qBench.last)/1000;_qBench.last=_qnow;
  if(_qdt>1/30) _qBench.low += _qdt; else _qBench.low=Math.max(0,_qBench.low-_qdt*.5);
  if(_qBench.low>5){
    const curQ=(()=>{try{return localStorage.getItem('dashui.quality')||'mid'}catch(e){return 'mid'}})();
    if(curQ!=='low'){
      try{localStorage.setItem('dashui.quality','low')}catch(e){}
      applyQuality('low');toast('画質を「低」に自動調整');
      _qBench.low=0;
    }
  }
}
let _qBench=null;
animate();

building.visible=false;
world.visible=true;

addEventListener('pointerdown',()=>{
  if(!SND_UNLOCKED){SND_UNLOCKED=true;snd('welcome',.3)}
  startWind();
},{once:false});

/* Wind ambient: generated noise (no base64 asset) */
let windStarted=false;
function startWind(){
  if(windStarted)return;windStarted=true;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    const ctx=new AC();
    const sr=ctx.sampleRate;
    const buf=ctx.createBuffer(1,sr*2,sr);
    const data=buf.getChannelData(0);
    let last=0;
    for(let i=0;i<data.length;i++){
      const w=Math.random()*2-1;
      last=last*.94+w*.06;
      data[i]=last;
    }
    const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=360;bp.Q.value=.7;
    const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=900;
    const gain=ctx.createGain();gain.gain.value=.025;
    src.connect(bp);bp.connect(lp);lp.connect(gain);gain.connect(ctx.destination);
    const lfo=ctx.createOscillator();lfo.frequency.value=.13;
    const lfoG=ctx.createGain();lfoG.gain.value=.018;
    lfo.connect(lfoG);lfoG.connect(gain.gain);
    src.start();lfo.start();
  }catch(e){}
}

console.log('DASHUI Neo Studio ready');
