<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>DASHUI — Neo Studio</title>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/","ios-haptics":"https://esm.sh/ios-haptics@0.1.4"}}</script>
<style>
:root{--font:"SF Pro Display","SF Pro Text",-apple-system,system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1e;color:#fff;
  font-family:var(--font),'Hiragino Sans',sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none}
canvas{display:block}
#world{position:fixed;inset:0;z-index:1}
#bgWorld{position:fixed;inset:0;z-index:0;filter:blur(24px) brightness(.85);transform:scale(1.1);width:100%;height:100%}
.glass{background:rgba(255,255,255,.12);backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);border:1px solid rgba(255,255,255,.25);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 8px 32px rgba(0,0,0,.25)}
.btn{cursor:pointer;transition:transform .25s cubic-bezier(.2,.8,.2,1),background .25s}
.btn:hover{transform:scale(1.08)}.btn:active{transform:scale(.95)}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
  justify-content:center;transition:opacity .6s}
.screen.hide{opacity:0;pointer-events:none}

/* Title */
#title .label{position:absolute;top:24px;left:50%;transform:translateX(-50%);
  font-family:var(--font);font-size:13px;font-weight:400;letter-spacing:3px;opacity:.72;
  text-shadow:0 2px 10px rgba(0,0,0,.6)}
/* iOS lockscreen-style clock — compact, tight */
#title .clock{position:absolute !important;top:7vh !important;left:50%;transform:translateX(-50%);
  font-family:var(--font);
  font-size:clamp(64px,13vw,112px);font-weight:300;letter-spacing:-.05em;line-height:.92;
  cursor:pointer;transition:transform .25s cubic-bezier(.2,.8,.2,1);
  text-shadow:0 4px 32px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.3);
  font-variant-numeric:tabular-nums;font-feature-settings:"tnum","ss01";
  color:#fff;margin:0}
#title .clock:hover{transform:translateX(-50%) scale(1.03)}
#title .clock-sub{position:absolute !important;top:calc(7vh + clamp(70px,13.2vw,120px)) !important;left:50%;transform:translateX(-50%);
  font-family:var(--font);font-size:11px;color:rgba(255,255,255,.55);letter-spacing:2px;margin:0;
  font-weight:400}
#title .catch{font-size:clamp(28px,5vw,44px);font-weight:300;opacity:.92;margin-top:60px;letter-spacing:4px;
  text-shadow:0 2px 20px rgba(0,0,0,.5)}
#title .nav{position:absolute;bottom:72px;display:flex;gap:40px}
/* T13 + Neosaurs-style: 作るボタンは 3D liquid-button 風、脱出クリア前は locked */
#titleCreateBtn{position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,204,0,.22),rgba(255,136,0,.18));
  box-shadow:inset 1px -.8px .5px rgba(255,255,255,.64),
    inset -1.8px 1.5px 1px rgba(255,255,255,.55),
    0 10px 28px rgba(255,170,60,.22);
  transition:transform .4s cubic-bezier(.77,0,.18,1), box-shadow .3s, opacity .3s, background .3s}
#titleCreateBtn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;
  border-radius:50%;background:rgba(255,255,255,.22);transform:translate(-50%,-50%);
  transition:width .8s cubic-bezier(.77,0,.18,1), height .8s cubic-bezier(.77,0,.18,1);pointer-events:none}
#titleCreateBtn:hover::before{width:200px;height:200px}
#titleCreateBtn:active{transform:scale(.94);
  box-shadow:inset -1px .8px .5px rgba(255,255,255,.64),
    inset 1.8px -1.5px 1px rgba(255,255,255,.55)}
#titleCreateItem.locked #titleCreateBtn{opacity:.55;
  background:rgba(255,255,255,.05);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
  cursor:not-allowed;
  color:transparent!important;text-shadow:none!important}
#titleCreateItem.locked #titleCreateBtn::before{display:none}
#titleCreateItem.locked #titleCreateBtn::after{content:'🔒';
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:32px;opacity:1;pointer-events:none;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
#titleCreateItem.locked .cap{opacity:.6}
#titleCreateItem.locked .cap::after{content:' 🔒';font-size:10px;opacity:.7}
#title .nav .item.hasCleared #titleCreateBtn{
  box-shadow:inset 1px -.8px .5px rgba(255,255,255,.7),
    inset -1.8px 1.5px 1px rgba(255,255,255,.6),
    0 0 26px rgba(255,200,100,.55);
  animation:createPulse 2.4s ease-in-out infinite}
#title .nav .item.hasCleared #titleCreateBtn::after{
  content:'✨';position:absolute;top:-4px;right:-4px;font-size:14px;pointer-events:none}
#title .nav .item{display:flex;flex-direction:column;align-items:center;gap:12px}
#title .nav .circ{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:32px}
#title .nav .cap{font-size:12px;opacity:.85;letter-spacing:1px}
#title .nav .circ.dim{opacity:.35;pointer-events:none}
#title .corner{position:absolute;bottom:26px;width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:20px}
#title .corner.l{left:26px}#title .corner.r{right:26px}

.modal-ov{position:fixed;inset:0;z-index:140;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);
  opacity:0;pointer-events:none;
  transition:opacity .32s cubic-bezier(.2,.8,.2,1),background .32s,backdrop-filter .32s,-webkit-backdrop-filter .32s}
.modal-ov.on{opacity:1;pointer-events:auto;background:rgba(0,0,0,.45);
  backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4)}
.modal{padding:26px 30px;border-radius:24px;min-width:300px;max-width:90vw;text-align:center;
  transform:scale(.3);opacity:0;
  transition:transform .5s cubic-bezier(.22,1.3,.36,1),opacity .35s cubic-bezier(.4,0,.2,1)}
.modal-ov.on .modal{transform:scale(1);opacity:1}
.modal h2{font-size:22px;font-weight:500;margin-bottom:14px;letter-spacing:1px}
.modal .row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.1)}
.modal .row:last-of-type{border:none}
.modal .row span:first-child{opacity:.6}
.modal button{margin-top:16px;padding:10px 28px;border-radius:14px;border:none;color:#fff;
  font-size:14px;background:rgba(255,255,255,.14);cursor:pointer}

/* iPod picker */
.modal.ipodm{padding:0;min-width:300px;max-width:360px;overflow:hidden;
  background:linear-gradient(180deg,#2a2f3a 0%,#14171d 100%);
  border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)}
.ipodm .ipod-head{padding:14px 16px 10px;background:linear-gradient(180deg,#3a4250,#2a3040);
  border-bottom:1px solid rgba(0,0,0,.35)}
.ipodm .ipod-screen{background:#bcd4e6;border-radius:10px;padding:10px 14px;color:#1a1f2b;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.25),inset 0 -1px 0 rgba(255,255,255,.4)}
.ipodm .ipod-title{font-weight:600;font-size:13px;letter-spacing:.5px;opacity:.9}
.ipodm .ipod-sub{font-size:11px;opacity:.65;margin-top:2px}
.ipodm .ipod-list{max-height:40vh;overflow-y:auto}
.ipodm .ipod-row{display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;color:#eee;font-size:14px;
  transition:background .15s}
.ipodm .ipod-row:hover{background:rgba(255,255,255,.05)}
.ipodm .ipod-row.playing{background:linear-gradient(180deg,#3a6aa8,#2a4a84);color:#fff}
.ipodm .ipod-ic{width:18px;text-align:center;opacity:.85}
.ipodm .ipod-lbl{flex:1;font-weight:500}
.ipodm .ipod-id{font-size:10px;opacity:.45;letter-spacing:.5px}
.ipodm .ipod-ctrl{display:flex;gap:10px;padding:12px 14px;background:rgba(0,0,0,.35);
  border-top:1px solid rgba(255,255,255,.05)}
.ipodm .ipod-btn{flex:1;margin:0;padding:10px 0;border-radius:12px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);color:#fff;font-size:13px;letter-spacing:1px;cursor:pointer}
.ipodm .ipod-btn:hover{background:rgba(255,255,255,.14)}

/* iPod 3D modal — split layout */
.modal.ipod3dfull{padding:18px;min-width:500px;max-width:560px;
  background:linear-gradient(180deg,#2a2f38,#14171d);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;color:#fff;
  box-shadow:0 30px 60px rgba(0,0,0,.6)}
/* iPod: 3D のみモード(曲リスト/ボタン撤去) */
.ipod3dfull.ipod3donly .ipod-list,
.ipod3dfull.ipod3donly .ipod-btnrow,
.ipod3dfull.ipod3donly .ipod-filebtn,
.ipod3d .ipod-list, .ipod3d .ipod-btnrow, .ipod3d .ipod-filebtn{display:none!important}
.ipodm .ipod-3donly{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px 20px 18px}
.ipodm .ipod-3dwrap.big{width:min(78vw,300px);aspect-ratio:1;position:relative;
  background:radial-gradient(circle at 30% 22%, rgba(255,255,255,.15), transparent 70%);
  border-radius:22px}
.ipodm .ipod-3dwrap.big canvas{display:block;width:100%;height:100%}
.ipodm .ipod-np.only{text-align:center;max-width:92%;padding:10px 16px;border-radius:14px;
  background:rgba(255,255,255,.06);width:100%}
.ipodm .ipod-np.only .ipod-np-title{font:600 15px var(--font);color:#fff;letter-spacing:.5px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ipodm .ipod-np.only .ipod-np-sub{font:400 11px var(--font);color:rgba(255,255,255,.55);margin-top:3px}
.ipodm .ipod-3donly .ipod-close{padding:10px 32px;border-radius:88px;
  background:rgba(255,255,255,.08);color:#fff;border:none;font-size:14px;cursor:pointer;
  box-shadow:inset 1px -.8px .5px rgba(255,255,255,.55),inset -1.6px 1.5px 1px rgba(255,255,255,.45);
  transition:transform .25s}
.ipodm .ipod-3donly .ipod-close:active{transform:scale(.94)}
.ipod3dfull .ipod-split{display:flex;gap:16px}
.ipod3dfull .ipod-3dwrap{width:220px;flex-shrink:0;position:relative;
  background:radial-gradient(ellipse at 50% 40%,#3c4452 0%,#1a1d24 75%);
  border-radius:14px;padding:10px;display:flex;align-items:center;justify-content:center}
.ipod3dfull .ipod-3dwrap canvas{display:block}
.ipod3dfull .ipod-3dhint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font:500 10px var(--font);color:rgba(255,255,255,.55);letter-spacing:.5px}
.ipod3dfull .ipod-rightcol{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
.ipod3dfull .ipod-np{background:rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;
  border:1px solid rgba(255,255,255,.08)}
.ipod3dfull .ipod-np-title{font:600 14px var(--font);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;color:#fff}
.ipod3dfull .ipod-np-sub{font:400 10px var(--font);color:rgba(255,255,255,.55);margin-top:2px}
.ipod3dfull .ipod-progress{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:8px}
.ipod3dfull .ipod-progress i{display:block;height:100%;background:linear-gradient(90deg,#4f9dff,#85c0ff);
  border-radius:2px;width:0%;transition:width .2s}
.ipod3dfull .ipod-np-times{display:flex;justify-content:space-between;font:400 9px var(--font);
  color:rgba(255,255,255,.5);margin-top:3px}
.ipod3dfull .ipod-list{max-height:180px;overflow-y:auto;background:rgba(0,0,0,.2);
  border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.ipod3dfull .ipod-row{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);color:#eee;font:500 12px var(--font)}
.ipod3dfull .ipod-row:hover{background:rgba(255,255,255,.06)}
.ipod3dfull .ipod-row.playing{background:linear-gradient(180deg,#1a86ff,#0060cc);color:#fff}
.ipod3dfull .ipod-ic{width:12px;text-align:center}
.ipod3dfull .ipod-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ipod3dfull .ipod-id{font-size:9px;opacity:.5}
.ipod3dfull .ipod-btnrow{display:flex;gap:6px}
.ipod3dfull .ipod-bbtn{flex:1;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:9px;font:500 13px var(--font);cursor:pointer;letter-spacing:1px}
.ipod3dfull .ipod-bbtn:hover{background:rgba(255,255,255,.14)}
.ipod3dfull .ipod-filebtn{display:block;width:100%;padding:10px;border-radius:10px;
  background:linear-gradient(180deg,#1a86ff,#006fe0);color:#fff;text-align:center;
  font:500 12px var(--font);cursor:pointer;letter-spacing:.3px}
.ipod3dfull .ipod-filebtn:hover{background:linear-gradient(180deg,#2a91ff,#0078f0)}
.ipod3dfull .ipod-close{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;
  border-radius:10px;padding:8px;font:500 12px var(--font);cursor:pointer}
.ipod3dfull .ipod-close:hover{background:rgba(255,255,255,.08)}

/* Legacy iPod Classic narrow style kept for older calls */
.modal.ipod3d:not(.ipod3dfull){padding:20px 18px 22px;min-width:300px;max-width:320px;
  background:linear-gradient(180deg,#f8f8f8 0%,#dcdcdc 55%,#b8bdc2 100%);
  border:1px solid rgba(0,0,0,.18);border-radius:22px;color:#111;
  box-shadow:0 30px 60px rgba(0,0,0,.55),
    inset 0 2px 0 rgba(255,255,255,.85),inset 0 -2px 6px rgba(0,0,0,.15)}
.modal.ipod3d{padding:20px 18px 22px;min-width:300px;max-width:320px;
  background:linear-gradient(180deg,#f8f8f8 0%,#dcdcdc 55%,#b8bdc2 100%);
  border:1px solid rgba(0,0,0,.18);border-radius:22px;color:#111;
  box-shadow:0 30px 60px rgba(0,0,0,.55),
    inset 0 2px 0 rgba(255,255,255,.85),inset 0 -2px 6px rgba(0,0,0,.15)}
.ipod3d .ipod-device{display:flex;flex-direction:column;gap:14px;align-items:center}
/* LCD screen area */
.ipod3d .ipod-screen-3d{width:100%;background:linear-gradient(180deg,#d8e0e2,#b5c1c4);
  border-radius:8px;padding:0;overflow:hidden;
  box-shadow:inset 0 3px 8px rgba(0,0,0,.45),inset 0 -1px 2px rgba(255,255,255,.45),
    0 0 0 2px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.6);
  font-family:"Chicago","Myriad","Helvetica Neue",-apple-system,sans-serif}
.ipod3d .ipod-menubar{background:linear-gradient(180deg,#4f6a94,#33547d);color:#fff;
  font:600 11px -apple-system,"SF Pro Text",sans-serif;padding:5px 10px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(0,0,0,.4);text-shadow:0 1px 0 rgba(0,0,0,.3)}
.ipod3d .ipod-menubar .mb-ic{opacity:.9}
.ipod3d .ipod-nowplay{background:linear-gradient(180deg,#ffffff,#e4ebf0);padding:8px 10px;
  border-bottom:1px solid rgba(0,0,0,.1);display:flex;gap:10px;align-items:center}
.ipod3d .ipod-art{width:44px;height:44px;border-radius:4px;
  background:linear-gradient(135deg,#6b7eff,#c06bff);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:22px;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.ipod3d .ipod-np-info{flex:1;min-width:0}
.ipod3d .ipod-np-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;color:#111}
.ipod3d .ipod-np-sub{font-size:10px;color:#555;margin-top:1px}
.ipod3d .ipod-progress{height:4px;background:rgba(0,0,0,.15);border-radius:2px;margin-top:4px;
  box-shadow:inset 0 1px 1px rgba(0,0,0,.15)}
.ipod3d .ipod-progress i{display:block;height:100%;background:linear-gradient(90deg,#4f7dc7,#85aeda);
  border-radius:2px;width:33%}
.ipod3d .ipod-np-times{display:flex;justify-content:space-between;font-size:9px;color:#666;margin-top:2px}
/* List */
.ipod3d .ipod-list{max-height:160px;overflow-y:auto;background:#eef2f3}
.ipod3d .ipod-row{display:flex;align-items:center;gap:8px;padding:5px 10px;
  border-bottom:1px solid rgba(0,0,0,.07);cursor:pointer;color:#111;font-size:11.5px}
.ipod3d .ipod-row:hover{background:rgba(0,0,0,.04)}
.ipod3d .ipod-row.playing{background:linear-gradient(180deg,#5b9be8,#2f67b4);color:#fff;font-weight:500}
.ipod3d .ipod-row.playing .ipod-id{color:rgba(255,255,255,.85)}
.ipod3d .ipod-ic{width:12px;text-align:center}
.ipod3d .ipod-lbl{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ipod3d .ipod-id{font-size:9px;opacity:.5;letter-spacing:.3px;flex-shrink:0}
/* Click wheel */
.ipod3d .ipod-wheel{position:relative;width:218px;height:218px;border-radius:50%;
  background:radial-gradient(circle at 50% 25%,#ffffff 0%,#e4e8ec 40%,#b7bec5 80%,#8e969e);
  box-shadow:inset 0 -6px 16px rgba(0,0,0,.22),
    inset 0 3px 6px rgba(255,255,255,.7),
    0 4px 14px rgba(0,0,0,.28)}
.ipod3d .ipod-wheel::before{content:"";position:absolute;inset:6px;border-radius:50%;
  border:1px solid rgba(255,255,255,.4);pointer-events:none}
.ipod3d .ipod-wheel button{position:absolute;background:none;border:none;color:rgba(0,0,0,.65);
  font:700 11px -apple-system,"SF Pro Text",sans-serif;cursor:pointer;padding:8px 10px;border-radius:10px;
  transition:background .15s,color .15s;letter-spacing:1px}
.ipod3d .ipod-wheel button:hover{background:rgba(255,255,255,.55);color:#000}
.ipod3d .iw-menu{top:12px;left:50%;transform:translateX(-50%)}
.ipod3d .iw-prev{left:6px;top:50%;transform:translateY(-50%)}
.ipod3d .iw-next{right:6px;top:50%;transform:translateY(-50%)}
.ipod3d .iw-play{bottom:12px;left:50%;transform:translateX(-50%)}
/* PEBBLE center button — convex dome */
.ipod3d .iw-center{left:50%;top:50%;transform:translate(-50%,-50%);width:84px;height:84px;border-radius:50%;
  background:
    radial-gradient(circle at 35% 25%,rgba(255,255,255,1) 0%,rgba(255,255,255,.3) 35%,transparent 55%),
    radial-gradient(circle at 50% 50%,#ffffff 0%,#e6e8ec 45%,#b0b6bd 80%,#8e949c 100%);
  box-shadow:
    inset 0 -6px 12px rgba(0,0,0,.22),
    inset 0 4px 8px rgba(255,255,255,.9),
    inset 0 0 1px rgba(0,0,0,.15),
    0 4px 10px rgba(0,0,0,.3)}
.ipod3d .iw-center:hover{background:
  radial-gradient(circle at 35% 25%,rgba(255,255,255,1) 0%,rgba(255,255,255,.4) 35%,transparent 55%),
  radial-gradient(circle at 50% 50%,#ffffff 0%,#edeff3 45%,#bcc2c9 80%,#9ba1a9 100%)}
.ipod3d .iw-center:active{transform:translate(-50%,-50%) scale(.97);
  box-shadow:inset 0 -2px 6px rgba(0,0,0,.15),inset 0 4px 8px rgba(0,0,0,.2)}
/* File loader */
.ipod3d .ipod-file{width:100%;margin-top:2px}
.ipod3d .ipod-filebtn{display:block;width:100%;padding:9px;border-radius:11px;text-align:center;
  background:linear-gradient(180deg,#1a86ff,#006fe0);color:#fff;
  font:500 12px "SF Pro Text",-apple-system,sans-serif;cursor:pointer;letter-spacing:.3px;
  box-shadow:0 2px 6px rgba(0,122,255,.35),inset 0 1px 0 rgba(255,255,255,.3)}
.ipod3d .ipod-filebtn:hover{background:linear-gradient(180deg,#2a91ff,#0078f0)}

/* iMac G4 modal with embedded emulator */
.modal.imacm{padding:10px;min-width:720px;max-width:900px;width:92vw;
  background:linear-gradient(180deg,#e5e5ea,#c9c9d0);border:1px solid rgba(0,0,0,.2);
  border-radius:14px;color:#111;font-family:var(--font);
  box-shadow:0 30px 60px rgba(0,0,0,.55)}
.imacm .imac-top{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 8px}
.imacm .imac-tabs{display:flex;gap:8px;align-items:center;flex:1}
.imacm .imac-tab{background:linear-gradient(180deg,#fff,#ddd);border:1px solid rgba(0,0,0,.25);
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500}
.imacm .imac-tab.active{background:#007aff;color:#fff;border-color:#005bb7}

/* Character */

  transition:background .4s,box-shadow .4s;position:relative}

#char .row{display:flex;gap:10px;padding:12px 18px;overflow-x:auto;max-width:94vw;border-radius:22px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:14px}
#char .row::-webkit-scrollbar{display:none}
#char .opt{flex-shrink:0;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:28px;background:rgba(255,255,255,.06);
  border:2px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s}
#char .opt:hover{transform:scale(1.15)}
#char .opt.sel{border-color:rgba(255,255,255,.85);background:rgba(255,255,255,.18);transform:scale(1.12)}
#char .opt img{width:32px;height:32px;object-fit:contain}
#char .col{flex-shrink:0;width:46px;height:46px;border-radius:50%;cursor:pointer;
  border:2px solid rgba(255,255,255,.2);transition:transform .2s,border-color .2s}
#char .col.sel{border-color:#fff;transform:scale(1.15)}
#char .col:hover{transform:scale(1.12)}
#char .go{margin-top:24px;padding:16px 58px;border-radius:32px;font-size:17px;
  background:linear-gradient(135deg,rgba(120,210,255,.35),rgba(200,130,255,.3));
  border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;letter-spacing:2px}

/* HUD */
#hud{position:fixed;inset:0;z-index:5;pointer-events:none;display:none}
#hud>*{pointer-events:auto}
#hud.on{display:block}
#compass{position:fixed;top:18px;left:18px;padding:10px;border-radius:18px;display:flex;gap:10px;
  align-items:center}
#compass .cn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);font-size:13px;font-weight:700}
#minimap{width:96px;height:96px;border-radius:50%;background:rgba(0,0,0,.3)}
#roomPill{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:24px;
  font-size:14px;font-weight:500;letter-spacing:2px}

  align-items:center;justify-content:center;font-size:20px;cursor:pointer}

  background:rgba(0,0,0,.35);overflow:hidden;display:none}
#stamina.on{display:block}
#stamina b{display:block;height:100%;background:linear-gradient(90deg,#7ce,#b8f);width:100%;transition:width .15s}
#invBar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:6px;
  padding:8px 12px;border-radius:22px}
.slot{width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}
.slot.sel{border-color:rgba(120,210,255,.75);transform:scale(1.1);box-shadow:0 0 14px rgba(120,200,255,.45)}
.slot .bd{position:absolute;bottom:-2px;right:-2px;background:#e85;border-radius:10px;font-size:10px;
  padding:1px 5px;font-weight:700;border:1px solid rgba(0,0,0,.3)}
#prompt{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:16px;
  font-size:14px;opacity:0;transition:opacity .25s;font-weight:500;pointer-events:none}
#prompt.on{opacity:1}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:18px;
  font-size:15px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:60}
#toast.on{opacity:1}
#getAnim{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;align-items:center;
  justify-content:center;pointer-events:none}
#getAnim.on{display:flex}
#getAnim .g1{font-size:96px;animation:gZ .8s ease-out}
#getAnim .g2{font-size:46px;font-weight:800;
  background:linear-gradient(90deg,#f66,#fc6,#6f9,#6cf,#c8f);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-size:300% 100%;animation:rbn .6s linear infinite,gZ .8s ease-out}
@keyframes gZ{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes rbn{0%{background-position:0%}100%{background-position:300%}}
@keyframes createPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

function snd(name,vol=1,loop=false){

  if(SND_PLAYING[name])return null;
  let a=SND_CACHE[name];
  if(!a){a=new Audio(SOUND_DIR+name+'.mp3');a.preload='auto';SND_CACHE[name]=a}
  try{a.currentTime=0;a.volume=vol;a.loop=loop;
    SND_PLAYING[name]=true;

let _lastHapT=0;
function _hapticIfButton(e){
  const now=performance.now();
  if(now-_lastHapT < 50) return;  // 連打ガード(スワイプで連発しないように)
  const t=e.target && e.target.closest && e.target.closest(HAPTIC_SEL);
  if(t){_lastHapT=now; haptic();}
}
document.addEventListener('touchstart',  _hapticIfButton, {capture:true, passive:true});

/* ─── スワイプ/スクロール開始でも haptic を一発鳴らす
   スクロール可能コンテナ or canvas のポインター移動が閾値超えた瞬間だけ鳴らす。
   連続して鳴らないよう swipeFired フラグでガードし、touchend でリセット。 */
const SWIPE_SEL = '.composeBar, .colGrid, .slotList, #cGrid, #world, .modal, .modal-ov';
let _swipeX=0, _swipeY=0, _swipeFired=false, _swipeId=null, _swipeTarget=null;
document.addEventListener('pointerdown', (e)=>{
  const t=e.target && e.target.closest && e.target.closest(SWIPE_SEL);
  if(!t) return;
  _swipeX=e.clientX; _swipeY=e.clientY; _swipeFired=false; _swipeId=e.pointerId; _swipeTarget=t;
}, {capture:true, passive:true});
document.addEventListener('pointermove', (e)=>{
  if(_swipeFired || e.pointerId!==_swipeId) return;
  const dx=e.clientX-_swipeX, dy=e.clientY-_swipeY;
  if(Math.hypot(dx,dy) > 14){            // 14px 動いたら1発
    _swipeFired=true;
    const now=performance.now();
    if(now-_lastHapT > 50){_lastHapT=now; haptic();}
  }
}, {capture:true, passive:true});
const _swipeEnd = ()=>{ _swipeFired=false; _swipeId=null; _swipeTarget=null; };
document.addEventListener('pointerup',     _swipeEnd, {capture:true, passive:true});

/* ─── PWA detection & OS-level notification
   PWA (standalone) かつ Notification 許可済みなら OS 通知を出す。
   それ以外(Web 閲覧中 / 拒否)は Dynamic Island にフォールバック。
   ※ 通知権限は初回起動時に 1 回だけ非同期リクエストする。 */
const IS_PWA = (()=>{
  try{
    return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;   // iOS Safari の独自フラグ
  }catch(_){return false;}
})();
let _notifReady=false;
(function requestNotifPerm(){
  if(!IS_PWA) return;
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){_notifReady=true;return;}
  if(Notification.permission==='denied') return;
  // default → 初回のユーザー操作時にリクエスト
  const ask=()=>{
    document.removeEventListener('pointerdown', ask, true);
    try{Notification.requestPermission().then(p=>{_notifReady=(p==='granted')})}catch(_){}
  };
  document.addEventListener('pointerdown', ask, {once:true, capture:true});
})();
function osNotify(title, body, icon){
  if(!IS_PWA || !_notifReady) return false;
  try{
    const n=new Notification(title, {body:body||'', icon:icon||undefined, silent:false, tag:'dashui'});
    setTimeout(()=>{try{n.close()}catch(_){}}, 3500);
    return true;
  }catch(_){return false;}
}
/* 通知 API のラッパー: PWA 時は OS 通知 + Island、それ以外は Island のみ */
function notify(emoji, text, sub, iconSrc){
  island(emoji, text, sub, iconSrc);
  osNotify(text, sub||'', iconSrc);
}

/* Ambient wind audio — filtered brown noise */
let windAudio=null;
function startWindAudio(){
  if(windAudio||!SND_UNLOCKED)return;
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    // Brown noise buffer
    const buf=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate);
    const d=buf.getChannelData(0);let lo=0;
    for(let i=0;i<d.length;i++){const w=(Math.random()*2-1)*.1;lo=(lo+w)/1.02;d[i]=lo*3.5}
    const src=ac.createBufferSource();src.buffer=buf;src.loop=true;
    const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=400;flt.Q.value=.7;
    const gain=ac.createGain();gain.gain.value=.04;
    src.connect(flt).connect(gain).connect(ac.destination);src.start();
    // gentle LFO on filter for breathing
    const lfo=ac.createOscillator();lfo.frequency.value=.15;
    const lfoGain=ac.createGain();lfoGain.gain.value=120;
    lfo.connect(lfoGain).connect(flt.frequency);lfo.start();
    windAudio={ac,gain,flt};
  }catch(e){}
}
function setWeather(name){

  scene.background=col;scene.fog.color.copy(col);scene.fog.far=w.fog;
  rainLines.visible=(name==='rain');
  if(name==='rain'){seedRain();weatherPoints.visible=false}
  else if(name==='snow'){weatherPoints.material=weatherSnowMat;weatherPoints.visible=true}
  else if(name==='wind'){weatherPoints.material=weatherWindMat;weatherPoints.visible=true}
  else{weatherPoints.visible=false}
  for(let i=0;i<WEATHER_PARTS;i++){
    weatherPos[i*3]=playerPos.x+(Math.random()-.5)*50;
    weatherPos[i*3+1]=playerPos.y+Math.random()*24;
    weatherPos[i*3+2]=playerPos.z+(Math.random()-.5)*50;
    if(name==='snow'){weatherVel[i*3]=(Math.random()-.5)*.7;weatherVel[i*3+1]=-1-Math.random()*.6;weatherVel[i*3+2]=(Math.random()-.5)*.7}
    else{weatherVel[i*3]=4+Math.random()*7;weatherVel[i*3+1]=(Math.random()-.5)*.4;weatherVel[i*3+2]=(Math.random()-.5)*2}
  }
  weatherGeo.attributes.position.needsUpdate=true;
  // update wind audio
  if(windAudio){
    const t=windAudio.ac.currentTime;
    windAudio.gain.gain.cancelScheduledValues(t);
    windAudio.gain.gain.linearRampToValueAtTime(w.windVol,t+1.5);
    windAudio.flt.frequency.cancelScheduledValues(t);
    windAudio.flt.frequency.linearRampToValueAtTime(w.windFc,t+1.5);
  }
  toast(w.label,1800);
}
function updateWeather(dt){
  if(G.area!=='grass')return;
  if(weatherPoints.visible){
    for(let i=0;i<WEATHER_PARTS;i++){
      weatherPos[i*3]+=weatherVel[i*3]*dt;
      weatherPos[i*3+1]+=weatherVel[i*3+1]*dt;
      weatherPos[i*3+2]+=weatherVel[i*3+2]*dt;
      const dx=weatherPos[i*3]-playerPos.x, dz=weatherPos[i*3+2]-playerPos.z;
      if(weatherPos[i*3+1]<-1||Math.abs(dx)>30||Math.abs(dz)>30){
        weatherPos[i*3]=playerPos.x+(Math.random()-.5)*50;
        weatherPos[i*3+1]=playerPos.y+10+Math.random()*18;
        weatherPos[i*3+2]=playerPos.z+(Math.random()-.5)*50;
      }
    }
    weatherGeo.attributes.position.needsUpdate=true;
  }
  if(rainLines.visible){
    const V=26; // fall speed
    for(let i=0;i<RAIN_N;i++){
      const b=i*6;
      rainPos[b+1]-=V*dt;rainPos[b+4]-=V*dt;
      const y=rainPos[b+4];
      const dx=rainPos[b]-playerPos.x, dz=rainPos[b+2]-playerPos.z;
      if(y<heightAt(rainPos[b],rainPos[b+2])-.1||Math.abs(dx)>30||Math.abs(dz)>30){
        const nx=playerPos.x+(Math.random()-.5)*55;
        const nz=playerPos.z+(Math.random()-.5)*55;
        const ny=playerPos.y+12+Math.random()*15;
        const len=.9+Math.random()*.7;
        rainPos[b]=nx;rainPos[b+1]=ny+len;rainPos[b+2]=nz;
        rainPos[b+3]=nx;rainPos[b+4]=ny;rainPos[b+5]=nz;
      }
    }
    rainGeo.attributes.position.needsUpdate=true;
  }
}

// カラーグレード(暖色tint + コントラスト + シャドウ青味)
const colorGradeShader={
  uniforms:{tDiffuse:{value:null},uEnabled:{value:1.0}},
  vertexShader:'varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
  fragmentShader:`
    uniform sampler2D tDiffuse;
    uniform float uEnabled;
    varying vec2 vUv;
    void main(){
      vec4 c=texture2D(tDiffuse,vUv);
      vec3 g=c.rgb*vec3(1.05,1.02,0.98);
      g=(g-0.5)*1.08+0.5;
      float lum=dot(g,vec3(0.299,0.587,0.114));
      if(lum<0.3) g+=vec3(0.0,0.0,0.02)*(0.3-lum);
      gl_FragColor=vec4(mix(c.rgb,g,uEnabled),c.a);
    }
  `
};
const colorGradePass=new ShaderPass(colorGradeShader);
composer.addPass(colorGradePass);
composer.addPass(new OutputPass());

// 品質設定(low/mid/high + 内部 max 昇格)
// max は UI に出さない。Neobench が高性能判定時のみ localStorage('dashui.quality.internal')='max' で有効化。
window.applyQuality=function(q){
  // 内部 max 昇格を確認
  const internalMax=(()=>{try{return localStorage.getItem('dashui.quality.internal')==='max'}catch(e){return false}})();
  if(q==='low'){
    renderer.setPixelRatio(1);
    bloomPass.enabled=true;bloomPass.strength=0.35;
    colorGradePass.uniforms.uEnabled.value=0;
  }else if(q==='high'){
    if(internalMax){
      // max: フル pixelRatio + 強い bloom + 強いグレード
      renderer.setPixelRatio(Math.min(devicePixelRatio,3));
      bloomPass.enabled=true;bloomPass.strength=0.95;bloomPass.radius=0.9;
      colorGradePass.uniforms.uEnabled.value=1;
    }else{
      renderer.setPixelRatio(Math.min(devicePixelRatio,2));
      bloomPass.enabled=true;bloomPass.strength=0.7;bloomPass.radius=0.8;
      colorGradePass.uniforms.uEnabled.value=1;
    }
  }else{ // mid
    renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
    bloomPass.enabled=true;bloomPass.strength=0.55;bloomPass.radius=0.8;
    colorGradePass.uniforms.uEnabled.value=1;
  }
  composer.setSize(innerWidth,innerHeight);
};
// 画質: デフォルト mid 固定。設定 UI で変更不可。Neobench が quality.internal='max' 認定した時のみ内部昇格

  localStorage.setItem('dashui.quality',q);

/* Procedural textures — marble floor, soft plaster wall */
const TEX_CACHE={};
function marbleTexture(base=0xf6f2ec,vein=0xb8a892,size=512){
  if(TEX_CACHE['m_'+base+'_'+vein])return TEX_CACHE['m_'+base+'_'+vein];
  const c=document.createElement('canvas');c.width=c.height=size;
  const cx=c.getContext('2d');
  const bc=new THREE.Color(base),vc=new THREE.Color(vein);
  cx.fillStyle='#'+bc.getHexString();cx.fillRect(0,0,size,size);
  // soft cloud shading
  for(let i=0;i<60;i++){
    const x=Math.random()*size,y=Math.random()*size,r=50+Math.random()*120;
    const g=cx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,.05)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
  }
  // veins
  cx.strokeStyle='#'+vc.getHexString();cx.globalAlpha=.35;
  for(let i=0;i<8;i++){
    cx.lineWidth=.5+Math.random()*2;
    cx.beginPath();
    let x=Math.random()*size,y=Math.random()*size;cx.moveTo(x,y);
    for(let j=0;j<20;j++){
      x+=(Math.random()-.5)*size*.3;y+=(Math.random()-.5)*size*.3;
      cx.lineTo(x,y);
    }
    cx.stroke();
  }
  cx.globalAlpha=1;
  const tx=new THREE.CanvasTexture(c);
  tx.colorSpace=THREE.SRGBColorSpace;
  tx.wrapS=tx.wrapT=THREE.RepeatWrapping;
  TEX_CACHE['m_'+base+'_'+vein]=tx;
  return tx;
}
function plasterTexture(base=0xe8e0d0){
  if(TEX_CACHE['p_'+base])return TEX_CACHE['p_'+base];
  const c=document.createElement('canvas');c.width=c.height=256;
  const cx=c.getContext('2d');
  const bc=new THREE.Color(base);
  cx.fillStyle='#'+bc.getHexString();cx.fillRect(0,0,256,256);
  const img=cx.getImageData(0,0,256,256);
  for(let i=0;i<img.data.length;i+=4){
    const n=(Math.random()-.5)*18;
    img.data[i]+=n;img.data[i+1]+=n;img.data[i+2]+=n;
  }
  cx.putImageData(img,0,0);
  const tx=new THREE.CanvasTexture(c);
  tx.colorSpace=THREE.SRGBColorSpace;
  tx.wrapS=tx.wrapT=THREE.RepeatWrapping;
  TEX_CACHE['p_'+base]=tx;
  return tx;
}

function textSprite(text,size=1,fs=44){
  const cv=document.createElement('canvas');cv.width=512;cv.height=96;
  const ctx=cv.getContext('2d');
  ctx.font='500 '+fs+'px "SF Pro Display","SF Pro Text",-apple-system,system-ui,sans-serif';

  ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=5;

  // final clean pass (no shadow) on top for crisp edge
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillText(text,256,52);
  const tx=new THREE.CanvasTexture(cv);tx.colorSpace=THREE.SRGBColorSpace;

function framedIcon(emoji,size=1.1,px=192,ringColor='rgba(255,255,255,.9)',glowColor='rgba(255,220,120,.55)'){
  const cv=document.createElement('canvas');cv.width=cv.height=px;
  const ctx=cv.getContext('2d');
  const cx=px/2,cy=px/2;
  // glow halo
  const g=ctx.createRadialGradient(cx,cy,px*.28,cx,cy,px*.5);
  g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(.55,glowColor.replace(/[\d.]+\)$/,'.2)'));
  g.addColorStop(.8,glowColor);
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,px,px);
  // inner disc
  ctx.beginPath();ctx.arc(cx,cy,px*.38,0,Math.PI*2);
  ctx.fillStyle='rgba(10,20,35,.38)';ctx.fill();
  // ring
  ctx.beginPath();ctx.arc(cx,cy,px*.4,0,Math.PI*2);
  ctx.strokeStyle=ringColor;ctx.lineWidth=5;ctx.stroke();
  // centered emoji
  ctx.font=(px*.5)+'px "Apple Color Emoji","Segoe UI Emoji",serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,cx,cy+px*.03);
  const tx=new THREE.CanvasTexture(cv);tx.colorSpace=THREE.SRGBColorSpace;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthWrite:false,depthTest:false}));
  sp.renderOrder=5;sp.scale.set(size,size,1);return sp;
}

const gGeo=new THREE.PlaneGeometry(GRASS_SIZE,GRASS_SIZE,GRASS_SEG,GRASS_SEG);

function nz(x,y){return Math.sin(x*.12)*Math.cos(y*.1)*1.6+Math.sin(x*.03+y*.04)*2.2}
for(let i=0;i<gPos.count;i++){
  gPos.setY(i,nz(gPos.getX(i),gPos.getZ(i)));

function heightAt(x,z){
  if(Math.abs(x)>GRASS_SIZE/2-2||Math.abs(z)>GRASS_SIZE/2-2)return 0;
  return nz(x,z);
}
/* 指定 (x,z) 近傍で平坦な場所へシフトする。近傍 R 範囲で heightAt の min を探索 */
function findFlat(xTarget,zTarget,radius=6,step=1){
  let bestX=xTarget,bestZ=zTarget,bestFlat=Infinity;
  for(let dx=-radius;dx<=radius;dx+=step){
    for(let dz=-radius;dz<=radius;dz+=step){
      const tx=xTarget+dx,tz=zTarget+dz;
      // 周辺 4 点の勾配(小さいほど平ら)
      const h=heightAt(tx,tz);
      const g=Math.abs(heightAt(tx+1,tz)-h)+Math.abs(heightAt(tx-1,tz)-h)
            +Math.abs(heightAt(tx,tz+1)-h)+Math.abs(heightAt(tx,tz-1)-h);
      // 低地+平坦を優先
      const score=g*1.5+Math.max(0,h)*0.4;
      if(score<bestFlat){bestFlat=score;bestX=tx;bestZ=tz}
    }
  }
  return {x:bestX,z:bestZ,y:heightAt(bestX,bestZ)};
}

/* Iron tower (鉄塔) */
(function ironTower(){
  const g=new THREE.Group();
  const steelMat=mkMat(0x66707a);
  const baseR=2.2,topR=.6,H=22;
  // 4 legs
  for(let k=0;k<4;k++){
    const a=k*Math.PI/2+Math.PI/4;
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(.12,.16,H,6),steelMat);
    leg.position.set(Math.cos(a)*((baseR+topR)/2),H/2,Math.sin(a)*((baseR+topR)/2));
    const tilt=Math.atan2(baseR-topR,H);
    leg.rotation.z=Math.cos(a)*tilt;leg.rotation.x=-Math.sin(a)*tilt;
    g.add(leg);
  }
  // horizontal rings
  for(let y of [3,8,14,19]){
    const r=baseR+(topR-baseR)*(y/H);
    const ring=new THREE.Mesh(new THREE.TorusGeometry(r,.07,6,20),steelMat);
    ring.rotation.x=Math.PI/2;ring.position.y=y;g.add(ring);
  }
  // X-braces
  for(let y=1;y<H-1;y+=3){
    for(let k=0;k<4;k++){
      const a=k*Math.PI/2+Math.PI/4;
      const br=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,3,5),steelMat);
      br.position.set(Math.cos(a)*(baseR+topR)/2,y+.8,Math.sin(a)*(baseR+topR)/2);
      br.rotation.z=Math.PI/3;br.rotation.y=a;g.add(br);
    }
  }
  // red warning light at top
  const redL=new THREE.Mesh(new THREE.SphereGeometry(.35,10,10),
    new THREE.MeshBasicMaterial({color:0xff3040}));
  redL.position.y=H+.3;g.add(redL);
  g.userData.blinker=redL;
  const rpl=new THREE.PointLight(0xff4040,1.2,10);rpl.position.y=H+.3;g.add(rpl);
  g.userData.blinkerLight=rpl;
  // antenna
  const ant=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,4,6),steelMat);
  ant.position.y=H+2;g.add(ant);
  const tx=55,tz=-60;
  g.position.set(tx,heightAt(tx,tz),tz);
  world.add(g);
  obstacles.push({x:tx,z:tz,r:2.4});
  world.userData.ironTower=g;
  TOWERS.push({x:tx,z:tz,top:g.position.y+H+1});
})();

function makeClassicMac(scale=1){
  // 16x16-ish pixel art palette matching the reference image
  const P=[
    '....LLLLLLLLLLLL....',
    '..LLkkkkkkkkkkkkLL..',
    '..Lkgggggggggggggg..',
    '..Lkgddddddddddggg..',
    '..Lkgdsssssssssdgg..',
    '..Lkgdsssssssssdgg..',
    '..Lkgdsssssssssdgg..',
    '..Lkgdssssssssswwg..',
    '..Lkggdwwwwwwwwwwg..',
    '..Lkgggggggggggggg..',
    '..Lkggreggggbbbbbg..',
    '..Lkggrogggbbbbbbg..',
    '..Lkgggggggggggggg..',
    '..Lkkkkkkkkkkkkkkk..',
    '..LLLLkkkkkkkkkLLL..',
    '....LLLLLLLLLLLL....',
  ];
  const map={'.':'rgba(0,0,0,0)','L':'#dcd6e0','k':'#000000','g':'#cfcfcf','d':'#555555','s':'#cedaff','w':'#ffffff','r':'#c93622','o':'#c93622','e':'#8cd14b','b':'#000000'};
  const sz=192;
  const cv=document.createElement('canvas');cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  const px=sz/P[0].length,py=sz/P.length;
  for(let y=0;y<P.length;y++)for(let x=0;x<P[y].length;x++){
    ctx.fillStyle=map[P[y][x]]||'#000';
    ctx.fillRect(x*px,y*py,Math.ceil(px),Math.ceil(py));
  }
  const tex=new THREE.CanvasTexture(cv);
  tex.magFilter=THREE.NearestFilter;tex.minFilter=THREE.NearestFilter;
  tex.colorSpace=THREE.SRGBColorSpace;
  const grp=new THREE.Group();
  // Plate
  const plate=new THREE.Mesh(new THREE.PlaneGeometry(1.4*scale,1.4*scale),
    new THREE.MeshBasicMaterial({map:tex,transparent:true}));
  grp.add(plate);
  // Slight 3D body behind the plate
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.4*scale,1.4*scale,.25*scale),
    new THREE.MeshPhongMaterial({color:0xd6d0c4,shininess:20}));
  body.position.z=-.15*scale;grp.add(body);
  // base
  const base=new THREE.Mesh(new THREE.BoxGeometry(1.6*scale,.15*scale,.35*scale),
    new THREE.MeshPhongMaterial({color:0xbbb5a8}));
  base.position.y=-.8*scale;grp.add(base);
  return grp;
}

const COLLECT_EMOJIS=['⭐','🥚','💎','🍄','🦕','🐚','👑','🌟','🔮'];

function makeCollectibleMesh(emoji,special){
  const g=new THREE.Group();
  const spin=new THREE.Group();g.add(spin);g.userData.spin=spin;
  switch(emoji){
    case '🥚':{
      const egg=new THREE.Mesh(new THREE.SphereGeometry(.38,16,12),
        new THREE.MeshLambertMaterial({color:special==='rainbow'?0xffeeff:0xf6ecd4,
          emissive:special==='rainbow'?0xffaacc:0x000000,emissiveIntensity:.25}));
      egg.scale.y=1.35;spin.add(egg);
      // speckles
      for(let i=0;i<6;i++){
        const sp=new THREE.Mesh(new THREE.SphereGeometry(.04,6,6),
          new THREE.MeshBasicMaterial({color:0xa08050}));
        const a=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);
        sp.position.set(Math.sin(p)*Math.cos(a)*.36,Math.cos(p)*.45,Math.sin(p)*Math.sin(a)*.36);
        spin.add(sp);
      }
      break;
    }
    case '⭐':case '🌟':{
      const mat=new THREE.MeshLambertMaterial({color:0xffdd33,emissive:0xffaa22,emissiveIntensity:.6});
      // 5-point star extruded
      const shape=new THREE.Shape();
      for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2-Math.PI/2;
        const r=i%2?.18:.42;shape[i?'lineTo':'moveTo'](Math.cos(a)*r,Math.sin(a)*r)}
      shape.closePath();
      const geo=new THREE.ExtrudeGeometry(shape,{depth:.12,bevelEnabled:true,bevelSize:.03,bevelThickness:.03,bevelSegments:2});
      geo.center();
      const star=new THREE.Mesh(geo,mat);spin.add(star);
      break;
    }
    case '💎':{
      const gem=new THREE.Mesh(new THREE.OctahedronGeometry(.42,0),
        new THREE.MeshPhongMaterial({color:0x88e0ff,emissive:0x226699,shininess:80,transparent:true,opacity:.9}));
      spin.add(gem);
      break;
    }
    case '🔮':{
      const orb=new THREE.Mesh(new THREE.SphereGeometry(.4,20,16),
        new THREE.MeshPhongMaterial({color:0xcc88ff,emissive:0x553388,transparent:true,opacity:.7,shininess:100}));
      spin.add(orb);

    }
    case '🍄':{
      const stem=new THREE.Mesh(new THREE.CylinderGeometry(.14,.18,.45,10),mkMat(0xf0ead6));
      stem.position.y=-.1;spin.add(stem);
      const cap=new THREE.Mesh(new THREE.SphereGeometry(.38,12,8,0,Math.PI*2,0,Math.PI/2),
        new THREE.MeshLambertMaterial({color:0xcc3a3a}));
      cap.position.y=.15;spin.add(cap);
      for(let i=0;i<4;i++){
        const d=new THREE.Mesh(new THREE.SphereGeometry(.06,6,6),mkMat(0xffffff));
        const a=i*Math.PI/2;d.position.set(Math.cos(a)*.2,.28,Math.sin(a)*.2);spin.add(d);
      }
      break;
    }
    case '🐚':{
      const shell=new THREE.Mesh(new THREE.ConeGeometry(.3,.55,12,1),mkMat(0xf4c9a0));
      shell.position.y=.05;spin.add(shell);
      // ridges
      for(let i=0;i<4;i++){

        rg.rotation.x=Math.PI/2;rg.position.y=-.2+i*.12;spin.add(rg);
      }
      break;
    }
    case '🦕':{
      const body=new THREE.Mesh(new THREE.CapsuleGeometry(.18,.55,4,8),mkMat(0x6aa858));
      body.rotation.z=Math.PI/2;body.position.y=.1;spin.add(body);
      const neck=new THREE.Mesh(new THREE.CapsuleGeometry(.08,.4,4,6),mkMat(0x6aa858));
      neck.position.set(.35,.3,0);neck.rotation.z=-.6;spin.add(neck);
      const head=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),mkMat(0x6aa858));
      head.position.set(.55,.45,0);spin.add(head);
      for(const[lx,lz] of [[-.15,.12],[.1,.12],[-.15,-.12],[.1,-.12]]){
        const leg=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.18,6),mkMat(0x558848));
        leg.position.set(lx,-.05,lz);spin.add(leg);
      }
      break;
    }
    case '👑':{
      const base=new THREE.Mesh(new THREE.CylinderGeometry(.3,.3,.14,12,1,true),
        new THREE.MeshLambertMaterial({color:0xf0c244,emissive:0x884400,emissiveIntensity:.3,side:THREE.DoubleSide}));
      base.position.y=.02;spin.add(base);
      const band=new THREE.Mesh(new THREE.TorusGeometry(.3,.05,6,16),
        new THREE.MeshLambertMaterial({color:0xf0c244}));
      band.rotation.x=Math.PI/2;band.position.y=-.04;spin.add(band);
      for(let i=0;i<7;i++){

          new THREE.MeshLambertMaterial({color:0xf0c244,emissive:0x663300,emissiveIntensity:.25}));

      spin.add(sp);

function makeCollectible(emoji,x,z,name,special){
  const g=makeCollectibleMesh(emoji,special);

  const halo=new THREE.Mesh(new THREE.SphereGeometry(.55,10,10),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:.22,depthWrite:false}));

(function registerMountainObstacles(){
  const step=8;
  const max=GRASS_SIZE/2-6;
  for(let x=-max;x<=max;x+=step){
    for(let z=-max;z<=max;z+=step){
      const h=heightAt(x,z);
      if(h>2.6){
        // 中心付近は通過させない障害物として登録
        obstacles.push({x,z,r:3.5});
      }
    }
  }
})();

function makeSunTex(){
  const c=document.createElement('canvas');c.width=c.height=512;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(256,256,0,256,256,256);
  g.addColorStop(0,'#fff2a0');g.addColorStop(.3,'#ffb444');
  g.addColorStop(.7,'#ff5500');g.addColorStop(1,'#cc2200');
  ctx.fillStyle=g;ctx.fillRect(0,0,512,512);
  // 表面ノイズ(細かいうねり)
  const img=ctx.getImageData(0,0,512,512);
  for(let i=0;i<img.data.length;i+=4){
    const n=(Math.random()-.5)*18;
    img.data[i]=Math.max(0,Math.min(255,img.data[i]+n));
    img.data[i+1]=Math.max(0,Math.min(255,img.data[i+1]+n*.6));
    img.data[i+2]=Math.max(0,Math.min(255,img.data[i+2]+n*.3));
  }
  ctx.putImageData(img,0,0);
  return new THREE.CanvasTexture(c);
}

(function setupTouch(){
  const joyEl=$('joy'),knob=$('joyKnob');
  let joyId=null,jCx=0,jCy=0;const R=55;
  joyEl.addEventListener('pointerdown',e=>{
    joyId=e.pointerId;const r=joyEl.getBoundingClientRect();
    jCx=r.left+r.width/2;jCy=r.top+r.height/2;
    e.preventDefault();e.stopPropagation();
    if(!SND_UNLOCKED)SND_UNLOCKED=true;
    try{haptic&&haptic()}catch(_){}
  });
  // T5: 方向切替 haptic(8方向、連続時は鳴らさない)
  let _joyLastDir=-1,_joyLastHapT=0;
  addEventListener('pointermove',e=>{
    if(e.pointerId!==joyId)return;
    let dx=e.clientX-jCx,dy=e.clientY-jCy;
    const L=Math.hypot(dx,dy);
    if(L>R){dx=dx/L*R;dy=dy/L*R}
    knob.style.transform=`translate(${dx}px,${dy}px)`;
    joyV.x=dx/R;joyV.y=dy/R;
    // 方向が 8方向のどれかを超える + デッドゾーン外 なら haptic
    if(Math.hypot(dx,dy) > R*.4){
      const ang=Math.atan2(dy,dx);
      const dir=((Math.round((ang+Math.PI)/(Math.PI/4)))%8 + 8)%8;
      const now=performance.now();
      if(dir!==_joyLastDir && (now-_joyLastHapT)>70){
        _joyLastDir=dir;_joyLastHapT=now;
        try{haptic&&haptic()}catch(_){}
      }
    }
  });
  const endJoy=e=>{if(e.pointerId===joyId){joyId=null;joyV.x=joyV.y=0;knob.style.transform='';_joyLastDir=-1}};
  addEventListener('pointerup',endJoy);
  addEventListener('pointercancel',endJoy);
  const jump=$('tJump');

    e.preventDefault();e.stopPropagation();

/* Fade a THREE.Group out over ~400ms then hide */
function fadeOutAndHide(grp){
  const mats=[];
  grp.traverse(o=>{
    if(o.material){const m=o.material;
      if(!m._origOpacity){m._origOpacity=m.opacity!=null?m.opacity:1;m.transparent=true}
      mats.push(m);
    }
  });
  const t0=performance.now(),DUR=420;
  const tick=()=>{
    const p=Math.min(1,(performance.now()-t0)/DUR);
    const a=1-p;
    for(const m of mats){m.opacity=(m._origOpacity||1)*a}
    grp.position.y+=.012;
    grp.scale.setScalar(Math.max(.1,1-p*.6));
    if(p<1)requestAnimationFrame(tick);
    else{grp.visible=false;
      // restore (in case of reuse)
      for(const m of mats){m.opacity=m._origOpacity;}
      grp.scale.set(1,1,1);
    }
  };
  tick();
}

function openMap(kind){
  const body=$('mBody');

  body.innerHTML=`
    <div class="map-head">
      <div class="map-title">${title}</div>

    </div>
    <div class="map-wrap">

  {const lc=land.getContext('2d');
    // Apple Maps-like base tint — light tan + soft green patches

    bg.addColorStop(0,'#f0ede5');bg.addColorStop(1,'#e3ded0');
    lc.fillStyle=bg;lc.fillRect(0,0,W,H);
    // green grass patches (low-freq noise circles)
    for(let i=0;i<40;i++){
      const x=Math.random()*W,y=Math.random()*H,r=30+Math.random()*90;
      const g=lc.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,'rgba(185,215,160,.55)');
      g.addColorStop(1,'rgba(185,215,160,0)');
      lc.fillStyle=g;lc.beginPath();lc.arc(x,y,r,0,7);lc.fill();
    }
    // water hint (if water exists in world)
    lc.fillStyle='rgba(150,200,230,.5)';
    lc.beginPath();lc.arc(W*.72,H*.28,45,0,7);lc.fill();
    // road grid (light)
    lc.strokeStyle='rgba(255,255,255,.8)';lc.lineWidth=6;
    lc.beginPath();lc.moveTo(0,H*.5);lc.lineTo(W,H*.5);lc.stroke();
    lc.beginPath();lc.moveTo(W*.5,0);lc.lineTo(W*.5,H);lc.stroke();
    lc.strokeStyle='rgba(0,0,0,.05)';lc.lineWidth=1;
    for(let x=0;x<=W;x+=30){lc.beginPath();lc.moveTo(x,0);lc.lineTo(x,H);lc.stroke()}
    for(let y=0;y<=H;y+=30){lc.beginPath();lc.moveTo(0,y);lc.lineTo(W,y);lc.stroke()}
  }
  function pin(x,y,color,label,size=8){
    // drop-shadow pin
    cx.save();
    cx.shadowColor='rgba(0,0,0,.25)';cx.shadowBlur=6;cx.shadowOffsetY=2;
    cx.fillStyle=color;
    cx.beginPath();cx.arc(x,y-size,size,Math.PI*1.1,Math.PI*1.9);
    cx.lineTo(x,y);cx.closePath();cx.fill();
    cx.restore();
    cx.fillStyle='#fff';cx.beginPath();cx.arc(x,y-size,size*.42,0,7);cx.fill();
    if(label){
      cx.font='600 11px "SF Pro Text",-apple-system,sans-serif';
      cx.fillStyle='rgba(0,0,0,.8)';
      cx.fillText(label,x+size+2,y-size+4);
    }
  }
  function draw(){
    cx.drawImage(land,0,0);
    const S=3.6,ox=W/2,oz=H/2;
    // Mansion pin
    pin(ox+portalIn.position.x*S,oz+portalIn.position.z*S,'#ff9500','屋敷');

    pin(ox+APPLE_ORB.x*S,oz+APPLE_ORB.z*S,'#007aff','Apple');
    // Iron tower (if exists)
    if(world.userData.ironTower){
      const tp=world.userData.ironTower.position;
      pin(ox+tp.x*S,oz+tp.z*S,'#af52de','🗼タワー',7);
    }
    // Other Apple Stores
    if(typeof APPLE_AIRPORT!=='undefined'){
      pin(ox+APPLE_AIRPORT.x*S,oz+APPLE_AIRPORT.z*S,'#007aff','Airport');
    }
    if(typeof APPLE_DOME!=='undefined'){
      pin(ox+APPLE_DOME.x*S,oz+APPLE_DOME.z*S,'#007aff','Dome');
    }
    // Collectibles
    collectibles.forEach(col=>{
      if(!col.visible)return;
      const px=ox+col.position.x*S,py=oz+col.position.z*S;
      cx.fillStyle='#ffcc00';
      cx.beginPath();cx.arc(px,py,3.5,0,7);cx.fill();
    });
    // Player — blue dot with halo (Apple Maps style)
    const px=ox+playerPos.x*S,py=oz+playerPos.z*S;
    cx.fillStyle='rgba(52,199,89,.25)';
    cx.beginPath();cx.arc(px,py,16,0,7);cx.fill();
    cx.fillStyle='#34c759';
    cx.beginPath();cx.arc(px,py,6,0,7);cx.fill();
    cx.strokeStyle='#fff';cx.lineWidth=2.5;cx.stroke();
    // Facing arrow
    const ang=G.camYaw;
    cx.save();cx.translate(px,py);cx.rotate(-ang);
    cx.fillStyle='rgba(52,199,89,.9)';
    cx.beginPath();cx.moveTo(0,-18);cx.lineTo(-5,-10);cx.lineTo(5,-10);cx.closePath();cx.fill();
    cx.restore();
  }
  draw();
  const mapId=setInterval(draw,200);
  body.querySelector('#mCl').onclick=()=>{clearInterval(mapId);snd('back',.5);$('mOv').classList.remove('on')};
}

    const rows=[...body.querySelectorAll('.ipod-row')];

    pickTrack(next.dataset.id);
  };
  const nextBtn=body.querySelector('#ipodNext');

    for(const f of e.target.files){
      const url=URL.createObjectURL(f);
      const id='user-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
      userTracks.push({id,label:f.name.replace(/\.[^.]+$/,''),url,file:f});
    }
    openIpodPicker();
  };
  // Mini three.js scene with 3D iPod
  (function mountIpod3D(){
    const cv=body.querySelector('#ipodCanvas');if(!cv)return;
    const w=220,h=340;cv.width=w*2;cv.height=h*2;cv.style.width=w+'px';cv.style.height=h+'px';
    const rd=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
    rd.setPixelRatio(2);rd.outputColorSpace=THREE.SRGBColorSpace;
    const sc=new THREE.Scene();
    const cam=new THREE.PerspectiveCamera(30,w/h,.1,100);cam.position.set(0,0,9);
    sc.add(new THREE.HemisphereLight(0xffffff,0x404048,.9));
    const k=new THREE.DirectionalLight(0xffffff,1);k.position.set(3,5,6);sc.add(k);
    const r2=new THREE.DirectionalLight(0xaaccff,.5);r2.position.set(-4,2,-3);sc.add(r2);
    const ipod=buildIPod3D(1);
    sc.add(ipod);
    let yaw=0,pit=.08,drag=false,px=0,py=0;
    cv.addEventListener('pointerdown',(e)=>{drag=true;px=e.clientX;py=e.clientY;cv.setPointerCapture(e.pointerId)});
    cv.addEventListener('pointermove',(e)=>{if(!drag)return;yaw+=(e.clientX-px)*.008;pit+=(e.clientY-py)*.006;
      pit=Math.max(-.6,Math.min(.6,pit));px=e.clientX;py=e.clientY});
    cv.addEventListener('pointerup',()=>{drag=false});
    const raf=()=>{
      if(!drag)yaw+=.004;
      ipod.rotation.y=yaw;ipod.rotation.x=pit;
      rd.render(sc,cam);
      _ipodMini.raf=requestAnimationFrame(raf);
    };
    _ipodMini={renderer:rd,raf:0,scene:sc};
    _ipodMini.raf=requestAnimationFrame(raf);
  })();
  // Progress updater
  if(window._ipodTick)clearInterval(window._ipodTick);
  window._ipodTick=setInterval(()=>{
    if(!$('mOv').classList.contains('on')){clearInterval(window._ipodTick);return}
    const prog=document.getElementById('ipodProg');
    const el=document.getElementById('ipodElap');
    const rm=document.getElementById('ipodRem');
    if(!prog||!bgmAudio){if(prog)prog.style.width='0%';return}
    const d=bgmAudio.duration||0, t=bgmAudio.currentTime||0;
    const pct=d?Math.min(100,(t/d)*100):0;
    prog.style.width=pct+'%';
    const f=(s)=>{s=Math.max(0,Math.floor(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')};
    if(el)el.textContent=f(t);
    if(rm)rm.textContent='-'+f(d-t);
  },400);
}

function openNeoBench(){
  const titleOn=$('title').style.display!=='none';
  if(titleOn){$('title').classList.add('nbActive');$('nbClockDots').classList.add('on')}
  const gl=renderer.getContext();
  const ext=gl.getExtension('WEBGL_debug_renderer_info');
  const gpu=ext?gl.getParameter(ext.UNMASKED_RENDERER_WEBGL):'unknown';
  const mem=(navigator.deviceMemory||'n/a')+' GB';
  const dev=(navigator.userAgent.match(/\((.*?)\)/)||[])[1]||'device';
  // Measuring phase: モーダルは測定中は表示しない(時計位置のドットだけで OK)
  $('mBody').className='modal glass nb';
  $('mBody').innerHTML=`<h2>NeoBench</h2>
    <p style="opacity:.7;font-size:13px;margin:6px 0">測定中…</p>
    <div class="nb-dots"><span></span><span></span><span></span></div>`;
  // mOv は測定完了後に開く(下の setTimeout 内)
  const mOv=$('mOv');const onClose=()=>{if(titleOn){$('title').classList.remove('nbActive');$('nbClockDots').classList.remove('on')};mOv.removeEventListener('transitionend',onClose)};
  // Sample FPS for ~1.3s, then reveal
  let samples=0,sumFps=0,last=performance.now();
  const sampleId=setInterval(()=>{
    const now=performance.now();const dt=(now-last)/1000;last=now;
    if(dt>0){sumFps+=1/dt;samples++}
  },33);
  setTimeout(()=>{
    clearInterval(sampleId);
    const fpsN=samples>2?(sumFps/samples):0;
    const fps=fpsN>0?fpsN.toFixed(0):'--';
    // T19: 内部 max 昇格判定(UI 非表示、FPS≥55 & 高解像度 GPU & メモリ豊富)
    const dmN=Number(navigator.deviceMemory||0);
    const gpuStr=(gpu||'').toLowerCase();
    const goodGpu=/apple|m1|m2|m3|m4|amd|radeon|nvidia|rtx|rx/.test(gpuStr);
    const maxOK=fpsN>=55 && dmN>=6 && goodGpu && devicePixelRatio>=2;
    let tierBadge='';
    try{
      if(maxOK){
        localStorage.setItem('dashui.quality.internal','max');
        tierBadge=' <span style="color:#fc9;font-weight:600">(内部 MAX 昇格)</span>';
        const curQ=localStorage.getItem('dashui.quality')||'high';
        if(curQ!=='low')applyQuality(curQ);
      }else{
        localStorage.removeItem('dashui.quality.internal');
      }
    }catch(e){}
    $('mBody').innerHTML=`<h2>NeoBench</h2>
      <div class="row"><span>FPS</span><span id="nbFps">${fps}${tierBadge}</span></div>
      <div class="row"><span>Device</span><span style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dev}</span></div>
      <div class="row"><span>GPU</span><span style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${gpu}</span></div>
      <div class="row"><span>Resolution</span><span>${innerWidth}×${innerHeight} @${devicePixelRatio}</span></div>
      <div class="row"><span>Memory</span><span>${mem}</span></div>
      <button class="nbtn" id="nbClose">閉じる</button>`;
    // 測定完了後にモーダル表示(ドットは隠す)
    $('mOv').classList.add('on');
    $('nbClockDots').classList.remove('on');
    snd('stop',.5);
    $('mBody').querySelector('#nbClose').onclick=()=>{
      snd('back',.5);hTap();
      $('mOv').classList.remove('on');
      if(titleOn)setTimeout(()=>$('title').classList.remove('nbActive'),400);
      setTimeout(()=>$('mBody').className='modal glass',450);
    };
  },1300);
}

        bt.style.background='linear-gradient(135deg,rgba(120,200,255,.35),rgba(80,140,240,.25))';

      const em=emojiSprite(p.emoji,.9);em.position.set(x,1,z);customRoom.add(em);
      const base=new THREE.Mesh(new THREE.CylinderGeometry(.25,.3,.5,8),mkMat(0x88aacc));
      base.position.set(x,.25,z);customRoom.add(base);
    }
  }
  customRoom.add(new THREE.AmbientLight(0xffffff,.45));
  const ptl=new THREE.PointLight(0xfff0cc,1.2,18);ptl.position.set(0,H-.3,0);customRoom.add(ptl);
